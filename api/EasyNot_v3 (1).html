<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyNot</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f7f4;--surface:#fff;--border:#e8e4de;--text:#1c1917;--muted:#78716c;--accent:#2563eb;--al:#eff6ff;--green:#16a34a;--gl:#f0fdf4;--red:#dc2626;--rl:#fef2f2;--purple:#7c3aed;--pl:#f5f3ff;--orange:#ea580c;--ol:#fff7ed;--yellow:#ca8a04;--yl:#fefce8;--r:12px;--s:0 1px 3px rgba(0,0,0,.08);--sm:0 4px 16px rgba(0,0,0,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6}
.page{display:none}.page.active{display:block}
#pg-auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
#pg-auth.active{display:flex}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:var(--sm);animation:fu .35s ease}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.abrand{display:flex;align-items:center;gap:.6rem;margin-bottom:2rem}
.abrand-icon{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem}
.abrand-name{font-family:'DM Serif Display',serif;font-size:1.2rem}
.atabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:1.8rem}
.atab{flex:1;padding:.5rem;border:none;background:transparent;border-radius:7px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;color:var(--muted);cursor:pointer;transition:all .2s}
.atab.active{background:#fff;color:var(--text);box-shadow:var(--s)}
.atitle{font-size:1.4rem;font-weight:700;margin-bottom:.2rem}
.asub{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--text);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.4px}
.field input{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--text);background:#fff;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.7rem 1.2rem;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff;width:100%;padding:.75rem}.btn-primary:hover{background:#1d4ed8}
.btn-sm{padding:.4rem .8rem;font-size:.82rem}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--red);color:#fff}.btn-success{background:var(--green);color:#fff}
.alert{padding:.7rem .9rem;border-radius:var(--r);font-size:.85rem;font-weight:500;margin-bottom:1rem;display:none}
.alert.error{background:var(--rl);color:var(--red);border:1px solid #fecaca}
.alert.success{background:var(--gl);color:var(--green);border:1px solid #bbf7d0}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;overflow-y:auto;display:flex;flex-direction:column;z-index:100}
.sbrand{padding:1.2rem 1.2rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem}
.sbrand-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.9rem;flex-shrink:0}
.sbrand-name{font-family:'DM Serif Display',serif;font-size:1rem}
.ssec{padding:1rem .8rem .4rem;font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.nitem{display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;margin:0 .4rem;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:500;color:var(--muted);transition:all .15s;border:none;background:transparent;width:calc(100% - .8rem);text-align:left}
.nitem:hover{background:var(--bg);color:var(--text)}.nitem.active{background:var(--al);color:var(--accent);font-weight:600}
.nitem .ni{font-size:1rem;width:20px;flex-shrink:0}
.sfooter{margin-top:auto;padding:.8rem;border-top:1px solid var(--border)}
.upill{display:flex;align-items:center;gap:.6rem;padding:.5rem .6rem;border-radius:8px;background:var(--bg)}
.uavatar{width:28px;height:28px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:700;flex-shrink:0}
.main{margin-left:240px;flex:1}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:1.05rem;font-weight:700}
.content{padding:2rem;max-width:1100px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--s)}
.card-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:.95rem;font-weight:700}.card-body{padding:1.5rem}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem 1.5rem;box-shadow:var(--s)}
.stat-label{font-size:.78rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:.4rem}
.stat-value{font-size:1.8rem;font-weight:700;font-family:'DM Serif Display',serif;line-height:1.1}
.stat-sub{font-size:.78rem;margin-top:.3rem;color:var(--muted)}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1rem;margin-bottom:2rem}
.dcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem;cursor:pointer;transition:all .15s;box-shadow:var(--s);position:relative;overflow:hidden}
.dcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.dcard:hover{box-shadow:var(--sm);transform:translateY(-1px)}
.dcard .dicon{font-size:1.6rem;margin-bottom:.6rem}
.dcard .dname{font-weight:700;font-size:.95rem;margin-bottom:.2rem}
.dcard .dcount{font-size:.78rem;color:var(--muted)}
.cb::before{background:var(--accent)}.cg::before{background:var(--green)}.co::before{background:var(--orange)}.cp::before{background:var(--purple)}.cr::before{background:var(--red)}.cy::before{background:var(--yellow)}
.ilist{list-style:none}
.iitem{display:flex;align-items:center;gap:.8rem;padding:.9rem 1rem;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.iitem:last-child{border-bottom:none}.iitem:hover{background:var(--bg)}
.ibadge{padding:.2rem .5rem;border-radius:5px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.bk{background:var(--al);color:var(--accent)}.bs{background:var(--gl);color:var(--green)}.bn{background:var(--pl);color:var(--purple)}
.ititle{font-weight:600;font-size:.9rem;flex:1}.imeta{font-size:.78rem;color:var(--muted)}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.moverlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:fu .25s ease}
.mheader{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mtitle{font-size:1rem;font-weight:700}
.mclose{width:28px;height:28px;border:none;background:var(--bg);border-radius:6px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.mbody{padding:1.5rem}
.mfooter{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.6rem;justify-content:flex-end}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.fg{display:flex;flex-direction:column;gap:.4rem}
.fg label{font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.fg input,.fg select,.fg textarea{padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;background:#fff;color:var(--text)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:100px}.ff{grid-column:1/-1}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:.7rem 1rem;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg)}
.tbl td{padding:.8rem 1rem;font-size:.88rem;border-bottom:1px solid var(--border)}
.tbl tr:hover td{background:var(--bg)}.tbl tr:last-child td{border-bottom:none}
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1.5rem}
.pig{display:flex;flex-direction:column;gap:.4rem}
.pig label{font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.pig input{padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.pig input:focus{border-color:var(--accent)}
.bkart{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem 1.5rem;box-shadow:var(--s);cursor:pointer;transition:all .15s}
.bkart:hover{box-shadow:var(--sm);transform:translateY(-1px)}
.bkart-h{display:flex;align-items:center;gap:.6rem;margin-bottom:.6rem}
.bname{font-weight:700;font-size:.95rem}.buni{font-size:.78rem;color:var(--muted)}
.btags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.6rem}
.tag{padding:.15rem .5rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:.72rem;font-weight:600;color:var(--muted)}
.idetay h1{font-family:'DM Serif Display',serif;font-size:1.8rem;font-weight:400;margin-bottom:.5rem;line-height:1.2}
.idetay-meta{font-size:.82rem;color:var(--muted);margin-bottom:1.5rem;display:flex;gap:1rem;flex-wrap:wrap}
.idetay-body{font-size:.95rem;line-height:1.8;color:#374151}
.idetay-body p{margin-bottom:1rem}.idetay-body h2{font-size:1.1rem;font-weight:700;margin:1.5rem 0 .6rem;color:var(--text)}.idetay-body ul{padding-left:1.5rem;margin-bottom:1rem}.idetay-body li{margin-bottom:.3rem}
.idetay-body table{width:100%;border-collapse:collapse;margin-bottom:1rem;font-size:.88rem}
.idetay-body table th,.idetay-body table td{border:1px solid var(--border);padding:.5rem .7rem;text-align:left}
.idetay-body table th{background:var(--bg);font-weight:700}
.skutu{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem;margin-bottom:1rem}
.sno{font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:.4rem}.smetin{font-weight:600;margin-bottom:.8rem}
.ssec-list{list-style:none;display:flex;flex-direction:column;gap:.4rem}
.ssec{padding:.5rem .8rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88rem;transition:all .15s;background:#fff}
.ssec:hover{border-color:var(--accent);background:var(--al)}
.ssec.dogru{border-color:var(--green);background:var(--gl);color:var(--green);font-weight:600}
.ssec.yanlis{border-color:var(--red);background:var(--rl);color:var(--red)}
.bc{display:flex;align-items:center;gap:.4rem;font-size:.82rem;color:var(--muted);margin-bottom:1.5rem}
.bc span{cursor:pointer}.bc span:hover{color:var(--accent)}.bcsep{color:var(--border)}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.8rem}.empty-title{font-weight:700;font-size:1rem;color:var(--text);margin-bottom:.3rem}
.formul-kutu{background:var(--al);border:1px solid #bfdbfe;border-radius:var(--r);padding:1rem 1.2rem;margin-bottom:.8rem;font-family:monospace;font-size:.95rem}
.formul-kutu .f-ad{font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.4px;margin-bottom:.3rem}
.video-kutu{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem}
.video-kutu .v-ikon{width:44px;height:44px;background:#ff0000;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;flex-shrink:0}
.video-kutu .v-baslik{font-weight:600;font-size:.9rem;margin-bottom:.2rem}
.video-kutu .v-meta{font-size:.78rem;color:var(--muted)}
.konu-filtre{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.kfiltre-btn{padding:.35rem .8rem;border:1.5px solid var(--border);border-radius:20px;font-size:.8rem;font-weight:600;cursor:pointer;background:#fff;color:var(--muted);transition:all .15s}
.kfiltre-btn:hover,.kfiltre-btn.active{border-color:var(--accent);color:var(--accent);background:var(--al)}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.g2,.g3,.g4{grid-template-columns:1fr}.content{padding:1rem}}
</style>
</head>
<body>

<div id="pg-auth" class="page active">
  <div class="acard">
    <div class="abrand"><div class="abrand-icon">📚</div><div class="abrand-name">EasyNot</div></div>
    <div class="atabs">
      <button class="atab active" onclick="aSekme('giris')">Giriş Yap</button>
      <button class="atab" onclick="aSekme('kayit')">Kayıt Ol</button>
    </div>
    <div class="alert" id="a-alert"></div>
    <div id="a-giris">
      <div class="atitle">Hoş geldin 👋</div>

      <div class="field"><label>Kullanıcı Adı</label><input type="text" id="g-u" autocomplete="username"></div>
      <div class="field"><label>Şifre</label><input type="password" id="g-p" onkeydown="if(event.key==='Enter')giris()"></div>
      <button class="btn btn-primary" onclick="giris()">Giriş Yap</button>
      <p style="font-size:.78rem;color:var(--muted);margin-top:.8rem;text-align:center">Admin: <b>admin</b> / <b>admin123</b> / 2FA: <b>000000</b></p>
    </div>
    <div id="a-mfa" style="display:none">
      <div style="text-align:center;margin-bottom:1.5rem"><div style="font-size:2rem;margin-bottom:.5rem">📲</div><div class="atitle">2FA Doğrulama</div><div class="asub" id="mfa-hint"></div></div>
      <div class="field"><label>6 Haneli Kod</label><input type="text" id="mfa-c" maxlength="6" style="text-align:center;letter-spacing:6px;font-size:1.2rem" onkeydown="if(event.key==='Enter')mfaTam()"></div>
      <button class="btn btn-primary" onclick="mfaTam()">Doğrula</button>

      <div class="atitle">Hesap oluştur ✨</div>

      <div class="field"><label>Kullanıcı Adı</label><input type="text" id="k-u"></div>
      <div class="field"><label>Şifre</label><input type="password" id="k-p"></div>

      <button class="btn btn-primary" onclick="kayit()">Kayıt Ol</button>
    </div>
  </div>
</div>

<div id="pg-app" class="page">
  <div class="layout">
    <nav class="sidebar">
      <div class="sbrand"><div class="sbrand-icon">📚</div><div class="sbrand-name">EasyNot</div></div>

      <button class="nitem" data-sayfa="ana" onclick="git('ana')"><span class="ni">🏠</span>Anasayfa</button>

      <button class="nitem" data-sayfa="formuller" onclick="git('formuller')"><span class="ni">🔢</span>Formül Kütüphanesi</button>
      <button class="nitem" data-sayfa="puan" onclick="git('puan')"><span class="ni">🎯</span>Puan Hesapla</button>
      <div class="ssec">Üniversite</div>
      <button class="nitem" data-sayfa="bolumler" onclick="git('bolumler')"><span class="ni">🎓</span>Bölüm Tanıtımları</button>
      <button class="nitem" data-sayfa="notlar" onclick="git('notlar')"><span class="ni">📝</span>Ders Notları</button>
      <button class="nitem" data-sayfa="siralama" onclick="git('siralama')"><span class="ni">📊</span>Sıralama Rehberi</button>
      <button class="nitem" data-sayfa="takvim" onclick="git('takvim')"><span class="ni">📅</span>Çalışma Takvimi</button>

      <div class="sfooter">
        <div class="upill"><div class="uavatar" id="s-av">?</div><div><div style="font-size:.82rem;font-weight:600" id="s-un">—</div><div style="font-size:.7rem;color:var(--muted)" id="s-rol">—</div></div></div>
        <button class="btn btn-outline btn-sm" style="width:100%;margin-top:.5rem" onclick="cikis()">Çıkış Yap</button>
      </div>
    </nav>
    <div class="main">
      <div class="topbar"><div class="topbar-title" id="tb-title">Anasayfa</div><span style="font-size:.82rem;color:var(--muted)" id="tb-user"></span></div>
      <div class="content" id="mc"></div>
    </div>
  </div>
</div>

<div class="moverlay" id="mov" onclick="mKapat(event)">

    <div class="mbody" id="mb"></div>
    <div class="mfooter" id="mf"></div>
  </div>
</div>

<script>
// ═══ DB ═══════════════════════════════════════════════════════════
const R=k=>{try{const v=localStorage.getItem('yn_'+k);return v?JSON.parse(v):[]}catch{return[]}}
const W=(k,v)=>localStorage.setItem('yn_'+k,JSON.stringify(v))

// ═══ BÜYÜK İÇERİK VERİTABANI ════════════════════════════════════
const ICERIK_DATA = [
  // ═══════════════════════════════════════════════
  // MATEMATİK (dId: 1)
  // ═══════════════════════════════════════════════
  {id:101,dId:1,tip:'konu',bas:'Sayılar ve Sayı Kümeleri',ice:`<h2>Doğal Sayılar (ℕ)</h2><p>0, 1, 2, 3, ... şeklinde sıralanan sayılardır. Negatif sayı ve kesir içermez.</p><h2>Tam Sayılar (ℤ)</h2><p>... -3, -2, -1, 0, 1, 2, 3, ... Negatif tam sayılar da dahildir.</p><h2>Rasyonel Sayılar (ℚ)</h2><p>a/b biçiminde (b≠0) yazılabilen sayılardır. Tüm kesirler ve tam sayılar bu kümededir.</p><h2>İrrasyonel Sayılar</h2><p>√2, √3, π gibi kesre dönüştürülemeyen sayılardır.</p><h2>Gerçel Sayılar (ℝ)</h2><p>Rasyonel ve irrasyonel sayıların birleşimidir. Sayı doğrusundaki tüm noktaları kapsar.</p><h2>Önemli Özellikler</h2><ul><li>ℕ ⊂ ℤ ⊂ ℚ ⊂ ℝ</li><li>Çift sayı: 2k, tek sayı: 2k+1 (k∈ℤ)</li><li>Asal sayı: 1 ve kendisinden başka böleni olmayan sayı (2,3,5,7,11...)</li><li>EBOB: En büyük ortak bölen; EKOK: En küçük ortak kat</li></ul>`,tar:'2024-09-01',ok:312},
  {id:102,dId:1,tip:'konu',bas:'Denklemler ve Eşitsizlikler',ice:`<h2>1. Dereceden Denklem</h2><p>ax + b = 0 biçimindedir. Çözüm: x = -b/a (a≠0)</p><h2>2. Dereceden Denklem</h2><p>ax² + bx + c = 0 biçimindedir.</p><p><b>Diskriminant: Δ = b² - 4ac</b></p><ul><li>Δ > 0 → 2 farklı gerçel kök</li><li>Δ = 0 → 1 çift kök (x = -b/2a)</li><li>Δ < 0 → gerçel kök yok</li></ul><h2>Vieta Bağıntıları</h2><ul><li>x₁ + x₂ = -b/a</li><li>x₁ · x₂ = c/a</li></ul><h2>Eşitsizlik Çözümü</h2><p>ax > b → x > b/a (a>0 ise), x < b/a (a<0 ise, yön değişir!)</p><h2>Mutlak Değerli Denklemler</h2><ul><li>|x| = a → x = a veya x = -a (a≥0)</li><li>|x| < a → -a < x < a</li><li>|x| > a → x < -a veya x > a</li></ul>`,tar:'2024-09-03',ok:287},
  {id:103,dId:1,tip:'konu',bas:'Fonksiyonlar',ice:`<h2>Fonksiyon Nedir?</h2><p>Her x elemanına tek bir y elemanı eşleyen kuraldır. f: A→B</p><h2>Terimler</h2><ul><li><b>Tanım kümesi (Df):</b> x değerlerinin kümesi</li><li><b>Değer kümesi (Rf):</b> y değerlerinin kümesi</li><li><b>Görüntü:</b> f(a) değeri</li></ul><h2>Fonksiyon Türleri</h2><ul><li><b>Birebir (1-1):</b> Farklı x'lere farklı y'ler</li><li><b>Örten (surjective):</b> Her y'nin preimage'i var</li><li><b>Bijeksiyonel:</b> Hem birebir hem örten</li></ul><h2>Birleşim ve Ters</h2><p>(f∘g)(x) = f(g(x)) — önce g, sonra f uygulanır.</p><p>f⁻¹ ters fonksiyon: f(a)=b ise f⁻¹(b)=a</p><h2>Öteleme ve Yansıma</h2><ul><li>f(x)+k → yukarı/aşağı öteleme</li><li>f(x+k) → sola/sağa öteleme</li><li>-f(x) → x eksenine göre yansıma</li><li>f(-x) → y eksenine göre yansıma</li></ul>`,tar:'2024-09-05',ok:265},
  {id:104,dId:1,tip:'konu',bas:'Türev ve Uygulamaları',ice:`<h2>Türev Tanımı</h2><p>f'(x) = lim[h→0] (f(x+h)-f(x))/h — anlık değişim hızı, teğetin eğimi.</p><h2>Türev Kuralları</h2><ul><li>(c)'=0</li><li>(xⁿ)'=nxⁿ⁻¹</li><li>(cf)'=cf'</li><li>(f±g)'=f'±g'</li><li>(fg)'=f'g+fg' (çarpım)</li><li>(f/g)'=(f'g-fg')/g² (bölüm)</li><li>[f(g(x))]'=f'(g(x))·g'(x) (zincir)</li></ul><h2>Özel Türevler</h2><ul><li>(eˣ)'=eˣ, (aˣ)'=aˣ·lna</li><li>(ln x)'=1/x, (logₐx)'=1/(x·lna)</li><li>(sin x)'=cos x, (cos x)'=-sin x</li><li>(tan x)'=1/cos²x</li></ul><h2>Uygulamalar</h2><ul><li>Artan: f'(x)>0, Azalan: f'(x)<0</li><li>Maksimum/Minimum: f'(x)=0 ve işaret değişimi</li><li>Büküm noktası: f''(x)=0</li><li>Teğet denklemi: y-y₀=f'(x₀)(x-x₀)</li></ul>`,tar:'2024-09-08',ok:341},
  {id:105,dId:1,tip:'konu',bas:'İntegral',ice:`<h2>Belirsiz İntegral</h2><p>∫f(x)dx = F(x)+C, F'(x)=f(x) koşuluyla</p><h2>Temel İntegral Formülleri</h2><ul><li>∫xⁿdx = xⁿ⁺¹/(n+1)+C (n≠-1)</li><li>∫1/x dx = ln|x|+C</li><li>∫eˣdx = eˣ+C</li><li>∫sin(x)dx = -cos(x)+C</li><li>∫cos(x)dx = sin(x)+C</li><li>∫1/(1+x²)dx = arctan(x)+C</li></ul><h2>Belirli İntegral</h2><p>∫[a,b] f(x)dx = F(b)-F(a) → eğri altındaki alan</p><h2>Yöntemler</h2><ul><li>Yerine koyma (substitution): u=g(x)</li><li>Parçalı integrasyon: ∫u dv = uv - ∫v du</li></ul><h2>Alan Hesabı</h2><p>İki eğri arasındaki alan: ∫[a,b] |f(x)-g(x)| dx</p>`,tar:'2024-09-10',ok:298},
  {id:106,dId:1,tip:'konu',bas:'Trigonometri',ice:`<h2>Temel Oranlar</h2><ul><li>sin θ = karşı/hipotenüs</li><li>cos θ = komşu/hipotenüs</li><li>tan θ = karşı/komşu = sin/cos</li><li>cot θ = cos/sin = 1/tan</li></ul><h2>Özel Açılar</h2><table><tr><th>Açı</th><th>sin</th><th>cos</th><th>tan</th></tr><tr><td>0°</td><td>0</td><td>1</td><td>0</td></tr><tr><td>30°</td><td>1/2</td><td>√3/2</td><td>1/√3</td></tr><tr><td>45°</td><td>√2/2</td><td>√2/2</td><td>1</td></tr><tr><td>60°</td><td>√3/2</td><td>1/2</td><td>√3</td></tr><tr><td>90°</td><td>1</td><td>0</td><td>—</td></tr></table><h2>Temel Özdeşlikler</h2><ul><li>sin²θ + cos²θ = 1</li><li>1 + tan²θ = 1/cos²θ (sec²θ)</li><li>1 + cot²θ = 1/sin²θ (csc²θ)</li></ul><h2>Toplam Formülleri</h2><ul><li>sin(A±B) = sinA·cosB ± cosA·sinB</li><li>cos(A±B) = cosA·cosB ∓ sinA·sinB</li><li>tan(A+B) = (tanA+tanB)/(1-tanA·tanB)</li></ul>`,tar:'2024-09-12',ok:276},
  {id:107,dId:1,tip:'konu',bas:'Logaritma ve Üslü Sayılar',ice:`<h2>Üslü Sayılar</h2><ul><li>aᵐ·aⁿ = aᵐ⁺ⁿ</li><li>aᵐ/aⁿ = aᵐ⁻ⁿ</li><li>(aᵐ)ⁿ = aᵐⁿ</li><li>a⁰ = 1 (a≠0)</li><li>a⁻ⁿ = 1/aⁿ</li><li>(ab)ⁿ = aⁿbⁿ</li></ul><h2>Logaritma</h2><p>logₐb = c ↔ aᶜ = b (a>0, a≠1, b>0)</p><h2>Logaritma Kuralları</h2><ul><li>logₐ(xy) = logₐx + logₐy</li><li>logₐ(x/y) = logₐx - logₐy</li><li>logₐxⁿ = n·logₐx</li><li>log₁₀ = lg (onluk), logₑ = ln (doğal)</li><li>Taban değişim: logₐb = logₓb / logₓa</li></ul><h2>Üstel ve Logaritmik Denklemler</h2><ul><li>aˣ = aʸ → x = y</li><li>logₐx = logₐy → x = y</li></ul>`,tar:'2024-09-14',ok:234},
  {id:108,dId:1,tip:'konu',bas:'Diziler ve Seriler',ice:`<h2>Aritmetik Dizi</h2><p>Her terim bir öncekine sabit d (ortak fark) eklenerek elde edilir.</p><ul><li>aₙ = a₁ + (n-1)d</li><li>Sₙ = n(a₁+aₙ)/2 = n(2a₁+(n-1)d)/2</li></ul><h2>Geometrik Dizi</h2><p>Her terim bir öncekiyle sabit r (ortak çarpan) ile çarpılır.</p><ul><li>aₙ = a₁·rⁿ⁻¹</li><li>Sₙ = a₁(rⁿ-1)/(r-1) (r≠1)</li><li>|r|<1 ise S∞ = a₁/(1-r)</li></ul><h2>Özel Toplamlar</h2><ul><li>1+2+...+n = n(n+1)/2</li><li>1²+2²+...+n² = n(n+1)(2n+1)/6</li><li>1³+2³+...+n³ = [n(n+1)/2]²</li></ul>`,tar:'2024-09-16',ok:198},
  {id:109,dId:1,tip:'konu',bas:'Olasılık ve İstatistik',ice:`<h2>Temel Kavramlar</h2><ul><li><b>Deney:</b> Sonucu önceden bilinmeyen işlem</li><li><b>Örnek uzay:</b> Tüm olası sonuçların kümesi</li><li><b>Olay:</b> Örnek uzayın alt kümesi</li></ul><h2>Olasılık</h2><p>P(A) = n(A) / n(S)</p><ul><li>P(A∪B) = P(A)+P(B)-P(A∩B)</li><li>Bağımsız: P(A∩B) = P(A)·P(B)</li><li>Koşullu: P(A|B) = P(A∩B)/P(B)</li></ul><h2>Permütasyon ve Kombinasyon</h2><ul><li>P(n,r) = n!/(n-r)!</li><li>C(n,r) = n! / (r!(n-r)!)</li><li>Tekrarlı permütasyon: nʳ</li></ul><h2>İstatistik</h2><ul><li>Ortalama: x̄ = Σxᵢ/n</li><li>Medyan: sıralı dizinin ortası</li><li>Mod: en sık tekrarlanan değer</li><li>Standart sapma: σ = √(Σ(xᵢ-x̄)²/n)</li></ul>`,tar:'2024-09-18',ok:221},
  {id:110,dId:1,tip:'konu',bas:'Limit ve Süreklilik',ice:`<h2>Limit Tanımı</h2><p>lim[x→a] f(x) = L → x, a'ya yaklaşırken f(x), L'ye yaklaşır.</p><h2>Limit Kuralları</h2><ul><li>lim(f±g) = lim f ± lim g</li><li>lim(f·g) = lim f · lim g</li><li>lim(f/g) = lim f / lim g (payda≠0)</li></ul><h2>Belirsiz Formlar ve L'Hôpital</h2><ul><li>0/0 veya ∞/∞ → lim f/g = lim f'/g'</li></ul><h2>Önemli Limitler</h2><ul><li>lim[x→0] sin(x)/x = 1</li><li>lim[x→0] (1-cos x)/x² = 1/2</li><li>lim[x→∞] (1+1/x)ˣ = e</li><li>lim[x→0] (eˣ-1)/x = 1</li><li>lim[x→0] ln(1+x)/x = 1</li></ul><h2>Süreklilik</h2><p>f(a) tanımlı, limit var ve lim[x→a] f(x) = f(a) ise f, a'da süreklidir.</p>`,tar:'2024-09-20',ok:187},
  {id:111,dId:1,tip:'konu',bas:'Analitik Geometri',ice:`<h2>İki Nokta Arası Uzaklık</h2><p>d = √[(x₂-x₁)²+(y₂-y₁)²]</p><h2>Orta Nokta</h2><p>M = ((x₁+x₂)/2, (y₁+y₂)/2)</p><h2>Doğru Denklemi</h2><ul><li>y = mx + b (eğim-kesim)</li><li>Eğim: m = (y₂-y₁)/(x₂-x₁)</li><li>Paralel: m₁=m₂, Dik: m₁·m₂=-1</li><li>İki noktalı form: (y-y₁)/(y₂-y₁) = (x-x₁)/(x₂-x₁)</li></ul><h2>Çember</h2><p>(x-a)²+(y-b)²=r² → merkez (a,b), yarıçap r</p><h2>Konik Kesitler</h2><ul><li>Parabol: y = ax² + bx + c, tepe: x = -b/2a</li><li>Elips: x²/a² + y²/b² = 1</li><li>Hiperbol: x²/a² - y²/b² = 1</li></ul><h2>Nokta-Doğru Uzaklığı</h2><p>d = |ax₀+by₀+c| / √(a²+b²)</p>`,tar:'2024-09-22',ok:203},
  {id:112,dId:1,tip:'konu',bas:'Matrisler ve Determinant',ice:`<h2>Matris Nedir?</h2><p>Sayıların dikdörtgen dizilimidir. m×n matris: m satır, n sütun.</p><h2>Matris İşlemleri</h2><ul><li>Toplama: Aynı boyuttaki matrislerde eleman eleman</li><li>Skaler çarpım: Her eleman k ile çarpılır</li><li>Çarpım: A(m×n) · B(n×p) = C(m×p)</li></ul><h2>Determinant (2×2)</h2><p>det(A) = |a b; c d| = ad - bc</p><h2>Determinant (3×3) — Sarrus Kuralı</h2><p>Üç sütunu genişletip çapraz çarpımları al.</p><h2>Ters Matris</h2><p>A·A⁻¹ = I, A⁻¹ = (1/det(A)) · adj(A)</p><h2>Cramer Yöntemi</h2><ul><li>Ax = b sistemi için: xᵢ = det(Aᵢ)/det(A)</li></ul>`,tar:'2024-09-24',ok:176},
  {id:113,dId:1,tip:'konu',bas:'Vektörler',ice:`<h2>Vektör Nedir?</h2><p>Büyüklük ve yönü olan nicelik. v=(x,y,z)</p><h2>Vektör İşlemleri</h2><ul><li>Toplama: u+v = (u₁+v₁, u₂+v₂)</li><li>Skaler çarpım: ku = (ku₁, ku₂)</li><li>Büyüklük: |v| = √(x²+y²+z²)</li><li>Birim vektör: v̂ = v/|v|</li></ul><h2>İç Çarpım (Dot Product)</h2><p>u·v = u₁v₁+u₂v₂ = |u||v|cosθ</p><ul><li>u⊥v ise u·v = 0</li><li>θ = arccos(u·v / (|u||v|))</li></ul><h2>Dış Çarpım (Cross Product)</h2><p>u×v — sonuç u ve v'ye dik vektör</p><ul><li>|u×v| = |u||v|sinθ = paralelkenar alanı</li></ul>`,tar:'2024-09-28',ok:154},
  {id:114,dId:1,tip:'konu',bas:'Kompleks Sayılar',ice:`<h2>Tanım</h2><p>z = a + bi, burada i = √(-1), i² = -1</p><ul><li>a: gerçel kısım, b: sanal kısım</li><li>i¹=i, i²=-1, i³=-i, i⁴=1 (döngü)</li></ul><h2>İşlemler</h2><ul><li>Toplama: (a+bi)+(c+di) = (a+c)+(b+d)i</li><li>Çarpım: (a+bi)(c+di) = (ac-bd)+(ad+bc)i</li><li>Eşlenik: z̄ = a-bi → z·z̄ = a²+b²</li><li>Modül: |z| = √(a²+b²)</li></ul><h2>Polar Form</h2><p>z = r(cosθ + i sinθ) = r·e^(iθ)</p><ul><li>r=|z|, θ=argüman</li><li>De Moivre: zⁿ = rⁿ(cos nθ + i sin nθ)</li></ul>`,tar:'2024-09-30',ok:142},
  {id:115,dId:1,tip:'konu',bas:'Binom Açılımı ve Sayma',ice:`<h2>Faktöriyel</h2><p>n! = n·(n-1)·...·2·1, 0! = 1</p><h2>Binom Teoremi</h2><p>(a+b)ⁿ = Σ C(n,k)·aⁿ⁻ᵏ·bᵏ</p><ul><li>(a+b)² = a²+2ab+b²</li><li>(a+b)³ = a³+3a²b+3ab²+b³</li><li>Genel terim: T(k+1) = C(n,k)·aⁿ⁻ᵏ·bᵏ</li></ul><h2>Permütasyon</h2><ul><li>P(n,r) = n!/(n-r)!</li><li>Dairesel: (n-1)!</li><li>Tekrarlı: n!/(n₁!·n₂!...)</li></ul><h2>Kombinasyon</h2><ul><li>C(n,r) = n!/(r!(n-r)!)</li><li>C(n,0)=C(n,n)=1</li><li>C(n,r)=C(n,n-r)</li></ul>`,tar:'2024-10-02',ok:167},
  {id:116,dId:1,tip:'soru',bas:'Matematik — Karma Sorular',ice:'soru',sorular:[

  {id:201,dId:2,tip:'konu',bas:'Hareket ve Kinematik',ice:`<h2>Temel Kavramlar</h2><ul><li><b>Konum (x):</b> Referans noktasına göre yer</li><li><b>Yer değiştirme (Δx):</b> x₂-x₁ (vektörel)</li><li><b>Hız (v):</b> Δx/Δt (vektörel)</li><li><b>İvme (a):</b> Δv/Δt</li></ul><h2>Sabit İvmeli Hareket</h2><ul><li>v = v₀ + at</li><li>x = v₀t + ½at²</li><li>v² = v₀² + 2ax</li><li>x = (v₀+v)t/2</li></ul><h2>Serbest Düşme</h2><p>g ≈ 10 m/s², v = gt, h = ½gt²</p><h2>Yatay Atış</h2><ul><li>x = v₀t (yatay, sabit hız)</li><li>y = ½gt² (düşey, serbest düşme)</li><li>Menzil: R = v₀²sin(2θ)/g</li></ul>`,tar:'2024-09-02',ok:298},
  {id:202,dId:2,tip:'konu',bas:'Newton\'un Hareket Yasaları',ice:`<h2>1. Yasa — Eylemsizlik</h2><p>Net kuvvet sıfırsa cisim durur ya da sabit hızla hareket eder.</p><h2>2. Yasa — F = ma</h2><p>Net kuvvet = kütle × ivme. F (N), m (kg), a (m/s²)</p><ul><li>Ağırlık: G = mg</li><li>Normal kuvvet: N = mg (yatay düzlemde)</li><li>Eğimli düzlem: F = mg·sinθ</li></ul><h2>3. Yasa — Etki-Tepki</h2><p>Her etki kuvvetine eşit ve zıt tepki vardır.</p><h2>Sürtünme Kuvveti</h2><ul><li>Kinetik: fk = μk·N</li><li>Statik: fs ≤ μs·N</li><li>μs > μk her zaman</li></ul><h2>Atwood Makinesi</h2><p>m₁>m₂ ise: a = (m₁-m₂)g/(m₁+m₂)</p>`,tar:'2024-09-04',ok:312},
  {id:203,dId:2,tip:'konu',bas:'Enerji, İş ve Güç',ice:`<h2>İş</h2><p>W = F·d·cosθ (Joule). θ aralarındaki açı.</p><ul><li>θ=0° → W=Fd (maks)</li><li>θ=90° → W=0</li><li>θ=180° → W=-Fd</li></ul><h2>Kinetik Enerji</h2><p>Ek = ½mv²</p><h2>İş-Enerji Teoremi</h2><p>W_net = ΔEk = Ek₂ - Ek₁</p><h2>Potansiyel Enerji</h2><ul><li>Yerçekimi: Ep = mgh</li><li>Yay: Ep = ½kx² (Hooke: F=-kx)</li></ul><h2>Enerji Korunumu</h2><p>Ek₁ + Ep₁ = Ek₂ + Ep₂ (sürtünme yoksa)</p><h2>Güç</h2><p>P = W/t = F·v (Watt)</p><p>Verimlilik: η = P_çıkış/P_giriş</p>`,tar:'2024-09-06',ok:267},
  {id:204,dId:2,tip:'konu',bas:'Dalgalar ve Ses',ice:`<h2>Dalga Türleri</h2><ul><li><b>Enine:</b> Titreşim yayılmaya dik (ışık)</li><li><b>Boyuna:</b> Titreşim yayılma yönünde (ses)</li></ul><h2>Dalga Formülleri</h2><ul><li>v = λ·f</li><li>T = 1/f</li><li>Dalga sayısı: k = 2π/λ</li><li>Açısal frekans: ω = 2πf</li></ul><h2>Ses</h2><ul><li>Havada ~340 m/s</li><li>Katıda > sıvıda > gazda</li><li>Ses şiddeti: dB</li></ul><h2>Doppler Etkisi</h2><p>f_alınan = f_kaynak · (v±v_alıcı)/(v∓v_kaynak)</p><h2>Girişim ve Kırınım</h2><ul><li>Yapıcı girişim: yol farkı = nλ</li><li>Yıkıcı girişim: yol farkı = (2n+1)λ/2</li></ul>`,tar:'2024-09-08',ok:234},
  {id:205,dId:2,tip:'konu',bas:'Elektrik ve Manyetizma',ice:`<h2>Coulomb Yasası</h2><p>F = k·q₁q₂/r² (k = 9×10⁹ N·m²/C²)</p><h2>Elektrik Alan</h2><p>E = F/q = k·Q/r², birim: N/C veya V/m</p><h2>Gauss Yasası</h2><p>Φ = Q_iç/ε₀ (kapalı yüzeyden geçen akı)</p><h2>Ohm Yasası</h2><p>V = I·R, R = ρL/A</p><h2>Devre Unsurları</h2><ul><li>Seri: R_top = R₁+R₂, I aynı, V dağılır</li><li>Paralel: 1/R = 1/R₁+1/R₂, V aynı, I dağılır</li><li>Kondansatör: C = Q/V, E = ½CV²</li></ul><h2>Manyetizma</h2><ul><li>Lorentz kuvveti: F = qv×B</li><li>Düz iletken: F = IL×B</li><li>Faraday: ε = -dΦ/dt</li></ul>`,tar:'2024-09-10',ok:256},
  {id:206,dId:2,tip:'konu',bas:'Optik — Işık',ice:`<h2>Işığın Özellikleri</h2><ul><li>Boşlukta c = 3×10⁸ m/s</li><li>Elektromanyetik dalga</li><li>Kırılma indisi: n = c/v</li></ul><h2>Yansıma Yasaları</h2><ul><li>Yansıma açısı = gelme açısı</li><li>Düzlem aynada: sanal, dik, boyutu aynı görüntü</li></ul><h2>Kırılma (Snell)</h2><p>n₁·sinθ₁ = n₂·sinθ₂</p><p>Tam iç yansıma: θ > θ_kritik</p><h2>Mercekler</h2><ul><li>İnce mercek: 1/f = 1/d_o + 1/d_i</li><li>Büyütme: M = -d_i/d_o</li><li>Konveks: yakınsak, f>0</li><li>Konkav: ıraksak, f<0</li></ul>`,tar:'2024-09-12',ok:213},
  {id:207,dId:2,tip:'konu',bas:'Isı ve Termodinamik',ice:`<h2>Sıcaklık Birimleri</h2><ul><li>K = °C + 273.15</li><li>°F = (9/5)°C + 32</li></ul><h2>Isı Formülü</h2><p>Q = m·c·ΔT</p><p>Özgül ısılar: Su=4200, Demir=450, Alüminyum=900 J/(kg·K)</p><h2>Hal Değişimleri</h2><ul><li>Erime/Donma: Q = m·L_f</li><li>Buharlaşma: Q = m·L_v</li></ul><h2>Termodinamik Yasalar</h2><ul><li>1. Yasa: ΔU = Q - W (enerji korunumu)</li><li>2. Yasa: Entropi artışı, ısı soğuktan sıcağa kendiliğinden geçmez</li><li>3. Yasa: Mutlak sıfırda entropi sıfır</li></ul><h2>İdeal Gaz</h2><p>PV = nRT (R = 8.314 J/mol·K)</p>`,tar:'2024-09-14',ok:198},
  {id:208,dId:2,tip:'konu',bas:'Modern Fizik',ice:`<h2>Fotoelektrik Olay</h2><p>E = hf (h = 6.626×10⁻³⁴ J·s)</p><ul><li>Eşik frekansının altında elektron kopamaz</li><li>Maksimum kinetik enerji: Ek = hf - W</li></ul><h2>Bohr Atom Modeli</h2><ul><li>Eₙ = -13.6/n² eV (hidrojen)</li><li>rₙ = n²·a₀ (a₀ = 0.529 Å)</li><li>Lymann (UV), Balmer (görünür), Paschen (IR)</li></ul><h2>De Broglie Dalgaboyu</h2><p>λ = h/p = h/(mv)</p><h2>Radyoaktivite</h2><ul><li>α bozunumu: Z→Z-2, A→A-4</li><li>β bozunumu: Z→Z+1 veya Z-1</li><li>γ ışıması: enerji salınımı, Z ve A değişmez</li><li>Yarı ömür: N = N₀·(1/2)^(t/T½)</li></ul>`,tar:'2024-09-18',ok:187},
  {id:209,dId:2,tip:'konu',bas:'Basit Harmonik Hareket',ice:`<h2>BHH Nedir?</h2><p>F = -kx geri yükleme kuvveti ile periyodik hareket.</p><h2>Yay-Kütle Sistemi</h2><ul><li>T = 2π√(m/k)</li><li>f = (1/2π)√(k/m)</li><li>x(t) = A·cos(ωt + φ)</li></ul><h2>Sarkaç</h2><ul><li>T = 2π√(L/g)</li><li>Küçük açılarda (θ < 15°) geçerli</li></ul><h2>Enerji</h2><ul><li>Toplam E = ½kA² (sabit)</li><li>Ek = ½k(A²-x²)</li><li>Ep = ½kx²</li></ul>`,tar:'2024-09-16',ok:176},
  {id:210,dId:2,tip:'konu',bas:'Basınç ve Akışkanlar',ice:`<h2>Basınç</h2><p>P = F/A (Pascal). Sıvıda: P = P₀ + ρgh</p><h2>Pascal Prensibi</h2><p>Kapalı sıvıya uygulanan basınç her yönde eşit iletilir.</p><p>F₁/A₁ = F₂/A₂ (hidrolik pres)</p><h2>Arşimet Prensibi</h2><p>F_kaldırma = ρ_sıvı · V_batık · g</p><ul><li>Cisim yüzer ise: ρ_cisim < ρ_sıvı</li></ul><h2>Bernoulli</h2><p>P + ½ρv² + ρgh = sabit</p><ul><li>Venturi tüpü, uçak kanadı</li></ul>`,tar:'2024-09-20',ok:165},
  {id:211,dId:2,tip:'konu',bas:'Çembersel Hareket ve Gravitasyon',ice:`<h2>Çembersel Hareket</h2><ul><li>Açısal hız: ω = 2π/T = 2πf = v/r</li><li>Merkezcil ivme: ac = v²/r = ω²r</li><li>Merkezcil kuvvet: Fc = mv²/r</li></ul><h2>Evrensel Çekim</h2><p>F = G·m₁m₂/r² (G = 6.67×10⁻¹¹)</p><ul><li>Yüzey çekimi: g = GM/R²</li></ul><h2>Kepler Yasaları</h2><ul><li>1. Yasa: Elips yörüngeler (güneş odakta)</li><li>2. Yasa: Eşit sürede eşit alan süpürme</li><li>3. Yasa: T² ∝ r³ → T₁²/T₂² = r₁³/r₂³</li></ul><h2>Uzay Hızları</h2><ul><li>1. kozmik hız: v₁ = √(gR) ≈ 7.9 km/s</li><li>2. kozmik hız: v₂ = √(2gR) ≈ 11.2 km/s</li></ul>`,tar:'2024-09-24',ok:189},

    {m:'v₀=0, a=5 m/s² ise 4s\'de yol?',s:['20 m','40 m','80 m','10 m'],c:1},

  {id:301,dId:3,tip:'konu',bas:'Atom Yapısı ve Periyodik Tablo',ice:`<h2>Atom Altı Parçacıklar</h2><ul><li><b>Proton:</b> +1 yük, 1 amu, çekirdekte</li><li><b>Nötron:</b> 0 yük, 1 amu, çekirdekte</li><li><b>Elektron:</b> -1 yük, ~0 amu, yörüngede</li></ul><h2>Atom Notasyonu</h2><p>ᴬ_Z X: A=kütle sayısı, Z=atom numarası, nötron= A-Z</p><h2>İzotoplar</h2><p>Aynı Z, farklı A → aynı element, farklı kütle</p><h2>Periyodik Tablo</h2><ul><li>Periyot: aynı satır, aynı elektron katmanı sayısı</li><li>Grup: aynı sütun, aynı değerlik elektron sayısı</li><li>Grup 1: Alkali metaller (Li, Na, K...)</li><li>Grup 17: Halojenler (F, Cl, Br...)</li><li>Grup 18: Soy gazlar (He, Ne, Ar...)</li></ul><h2>Periyodik Özellikler</h2><ul><li>Atom yarıçapı: periyotta azalır, grupta artar</li><li>İyonlaşma enerjisi: periyotta artar, grupta azalır</li><li>Elektronegatiflik: F en yüksek</li></ul>`,tar:'2024-09-01',ok:278},
  {id:302,dId:3,tip:'konu',bas:'Kimyasal Bağlar',ice:`<h2>İyonik Bağ</h2><p>Metal + ametal arası. Elektron transferi. Kristal kafes yapı.</p><ul><li>Yüksek erime/kaynama noktası</li><li>Suda çözünür ve iletken</li></ul><h2>Kovalent Bağ</h2><p>Ametal + ametal arası. Elektron paylaşımı.</p><ul><li>Tekli, çiftli, üçlü bağ</li><li>Polar: farklı EN → δ+ ve δ-</li><li>Apolar: aynı EN veya simetrik molekül</li></ul><h2>Metalik Bağ</h2><p>Metal atomları arası. Serbest elektron denizi.</p><ul><li>Elektrik ve ısı iletimi</li><li>Işıltı, dövülebilirlik</li></ul><h2>Zayıf Bağlar (Moleküller Arası)</h2><ul><li>Hidrojen bağı: N-H, O-H, F-H (güçlü)</li><li>Van der Waals: dipol-dipol, London kuvvetleri</li></ul>`,tar:'2024-09-03',ok:245},
  {id:303,dId:3,tip:'konu',bas:'Kimyasal Reaksiyonlar ve Denklemler',ice:`<h2>Denklem Denkleştirme</h2><p>Kütlenin korunumu: her iki tarafta aynı sayıda atom olmalı.</p><p>Örnek: 2H₂ + O₂ → 2H₂O</p><h2>Reaksiyon Türleri</h2><ul><li><b>Bileşim:</b> A + B → AB</li><li><b>Ayrışma:</b> AB → A + B</li><li><b>Yer değiştirme:</b> A + BC → AC + B</li><li><b>Çift yer değiştirme:</b> AB + CD → AD + CB</li><li><b>Yanma:</b> CₓHᵧ + O₂ → CO₂ + H₂O</li></ul><h2>Mol Kavramı</h2><ul><li>1 mol = 6.022×10²³ tanecik (Avogadro)</li><li>Molar kütle: g/mol</li><li>n = m/M = V/22.4 (STP'de gaz)</li></ul><h2>Stokiyometri</h2><p>Mol oranlarını kullanarak kütleleri hesapla.</p>`,tar:'2024-09-05',ok:234},
  {id:304,dId:3,tip:'konu',bas:'Asitler ve Bazlar',ice:`<h2>Tanımlar</h2><ul><li><b>Arrhenius:</b> Asit H⁺, baz OH⁻ verir</li><li><b>Brønsted-Lowry:</b> Asit proton verir, baz alır</li><li><b>Lewis:</b> Asit e⁻ çifti alır, baz verir</li></ul><h2>pH Kavramı</h2><ul><li>pH = -log[H⁺]</li><li>pH + pOH = 14 (25°C)</li><li>pH < 7: asidik, pH = 7: nötr, pH > 7: bazik</li></ul><h2>Kuvvetli / Zayıf</h2><ul><li>Kuvvetli asit: HCl, H₂SO₄, HNO₃, HClO₄</li><li>Kuvvetli baz: NaOH, KOH, Ca(OH)₂</li><li>Zayıf asit: CH₃COOH, H₂CO₃</li></ul><h2>Nötralizasyon</h2><p>Asit + Baz → Tuz + Su</p><p>HCl + NaOH → NaCl + H₂O</p><h2>Tampon Çözeltiler</h2><p>Zayıf asit + eşlenik bazı — pH değişimine direnç gösterir.</p>`,tar:'2024-09-07',ok:212},
  {id:305,dId:3,tip:'konu',bas:'Organik Kimya',ice:`<h2>Hidrokarbon Sınıfları</h2><ul><li><b>Alkanlar:</b> CₙH₂ₙ₊₂, tek bağ (metan, etan...)</li><li><b>Alkenler:</b> CₙH₂ₙ, çift bağ (eten, propen...)</li><li><b>Alkinler:</b> CₙH₂ₙ₋₂, üçlü bağ (asetilin...)</li><li><b>Arenler:</b> Benzen halkası (aromatik)</li></ul><h2>Fonksiyonel Gruplar</h2><table><tr><th>Grup</th><th>Formül</th><th>Sınıf</th></tr><tr><td>Hidroksil</td><td>-OH</td><td>Alkol</td></tr><tr><td>Karboksil</td><td>-COOH</td><td>Karboksilik asit</td></tr><tr><td>Aldehit</td><td>-CHO</td><td>Aldehit</td></tr><tr><td>Keton</td><td>-C=O-</td><td>Keton</td></tr><tr><td>Amin</td><td>-NH₂</td><td>Amin</td></tr><tr><td>Ester</td><td>-COO-</td><td>Ester</td></tr></table><h2>İzomerlik</h2><ul><li>Yapısal: aynı formül, farklı bağ</li><li>Geometrik (cis-trans): çift bağ etrafında</li><li>Optik: kiral karbon</li></ul>`,tar:'2024-09-09',ok:198},
  {id:306,dId:3,tip:'konu',bas:'Termokimya',ice:`<h2>Isı Değişimleri</h2><ul><li>Ekzotermik: ΔH < 0 (ısı açığa çıkar)</li><li>Endotermik: ΔH > 0 (ısı alınır)</li></ul><h2>Hess Yasası</h2><p>Toplam ΔH, ara basamaklardan bağımsız → ΔH toplamları.</p><h2>Oluşum Entalpisi</h2><p>ΔH°rxn = Σ ΔH°f(ürünler) - Σ ΔH°f(reaktifler)</p><h2>Bağ Enerjileri</h2><p>ΔH = Σ(kırılan bağ enerjisi) - Σ(kurulan bağ enerjisi)</p><h2>Kalorimetri</h2><p>q = m·c·ΔT</p><p>Bomba kalorimetresi: q_rxn = -q_su</p>`,tar:'2024-09-11',ok:176},
  {id:307,dId:3,tip:'konu',bas:'Kimyasal Denge',ice:`<h2>Denge Sabiti</h2><p>aA + bB ⇌ cC + dD için:</p><p>Kc = [C]ᶜ[D]ᵈ / [A]ᵃ[B]ᵇ</p><ul><li>Kc > 1: Ürünler tarafında</li><li>Kc < 1: Reaktifler tarafında</li></ul><h2>Le Chatelier Prensibi</h2><p>Sisteme bir etki yapılınca denge bu etkiyi azaltacak yönde kayar.</p><ul><li>Konsantrasyon artışı → ters yön</li><li>Sıcaklık artışı → endotermik yön</li><li>Basınç artışı → mol sayısı az olan yön</li></ul><h2>Çözünürlük Çarpımı (Ksp)</h2><p>AgCl(k) ⇌ Ag⁺ + Cl⁻, Ksp = [Ag⁺][Cl⁻]</p>`,tar:'2024-09-13',ok:156},
  {id:308,dId:3,tip:'soru',bas:'Kimya — Karma Sorular',ice:'soru',sorular:[
    {m:'1 mol kaç tanecik içerir?',s:['6.022×10²²','6.022×10²³','3.011×10²³','12×10²³'],c:1},
    {m:'pH = 3 olan çözeltinin [H⁺] konsantrasyonu?',s:['10⁻³ M','10³ M','3 M','0.3 M'],c:0},
    {m:'Ekzotermik reaksiyonda ΔH?',s:['ΔH > 0','ΔH < 0','ΔH = 0','Belirsiz'],c:1},
    {m:'Kovalent bağda ne paylaşılır?',s:['Proton','Nötron','Elektron','İyon'],c:2},
    {m:'Alkenler hangi fonksiyonel grubu içerir?',s:['Tek bağ','Çift bağ','Üçlü bağ','Hidroksil'],c:1},
    {m:'Le Chatelier prensibi neyle ilgili?',s:['Hız sabiti','Denge kayması','Mol sayısı','Entalpi'],c:1}
  ],tar:'2024-09-15',ok:312},

  {id:401,dId:4,tip:'konu',bas:'Hücre Yapısı ve Organeller',ice:`<h2>Prokaryot vs Ökaryot</h2><ul><li><b>Prokaryot:</b> Çekirdek zarı yok, bakteri ve arkeler</li><li><b>Ökaryot:</b> Zarla çevrili çekirdek, bitkiler, hayvanlar, mantarlar</li></ul><h2>Temel Organeller</h2><ul><li><b>Çekirdek:</b> DNA depolama, transkripsiyon</li><li><b>Mitokondri:</b> ATP üretimi (enerji santrali)</li><li><b>Kloroplast:</b> Fotosentez (sadece bitkilerde)</li><li><b>Endoplazmik retikulum:</b> Protein ve lipid sentezi</li><li><b>Golgi aygıtı:</b> Paketleme ve salgılama</li><li><b>Lizozom:</b> Hücre içi sindirim</li><li><b>Ribozom:</b> Protein sentezi</li><li><b>Vakuol:</b> Depolama (bitkilerde büyük)</li></ul><h2>Hücre Zarı</h2><p>Fosfolipid çift tabaka + proteinler. Seçici geçirgen.</p><ul><li>Pasif taşıma: difüzyon, osmoz (enerji gerekmez)</li><li>Aktif taşıma: ATP harcar, konsantrasyon gradyanına karşı</li></ul>`,tar:'2024-09-01',ok:289},
  {id:402,dId:4,tip:'konu',bas:'Fotosentez',ice:`<h2>Genel Denklem</h2><p>6CO₂ + 6H₂O + ışık → C₆H₁₂O₆ + 6O₂</p><h2>Işığa Bağımlı Reaksiyonlar (Tilakoit)</h2><ul><li>Su fotolizi: 2H₂O → 4H⁺ + 4e⁻ + O₂</li><li>ATP ve NADPH üretimi</li><li>Fotosistemleri PS I ve PS II</li></ul><h2>Işıktan Bağımsız (Calvin Döngüsü — Stroma)</h2><ul><li>CO₂ fiksasyonu: RuBisCO enzimi</li><li>3 tur: 1 CO₂ bağlanır</li><li>ATP + NADPH kullanılır</li><li>Ürün: G3P → glikoz</li></ul><h2>Etkileyen Faktörler</h2><ul><li>Işık şiddeti, CO₂ konsantrasyonu, sıcaklık</li><li>Kompanzasyon noktası: fotosentez = solunum</li></ul>`,tar:'2024-09-03',ok:267},
  {id:403,dId:4,tip:'konu',bas:'Solunum (Hücresel)',ice:`<h2>Genel Denklem</h2><p>C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + 36-38 ATP</p><h2>Glikoliz (Sitozol)</h2><ul><li>1 glikoz → 2 pirüvat</li><li>Net: 2 ATP, 2 NADH</li><li>Oksijen gerekmez</li></ul><h2>Krebs Döngüsü (Mitokondri Matrisi)</h2><ul><li>2 Asetil-CoA → 4 CO₂</li><li>6 NADH, 2 FADH₂, 2 ATP</li></ul><h2>Oksidatif Fosforilasyon (İç Zar)</h2><ul><li>Elektron taşıma zinciri</li><li>NADH → 3 ATP, FADH₂ → 2 ATP</li><li>Toplam: ~34 ATP</li></ul><h2>Fermantasyon</h2><ul><li>Laktik asit: kas hücreleri, bakteri</li><li>Alkol: maya (CO₂ de açığa çıkar)</li></ul>`,tar:'2024-09-05',ok:234},
  {id:404,dId:4,tip:'konu',bas:'DNA, RNA ve Genetik Şifre',ice:`<h2>DNA Yapısı</h2><ul><li>Nükleotitler: fosfat + şeker (deoksiriboz) + baz</li><li>Bazlar: Adenin (A), Timin (T), Guanin (G), Sitozin (C)</li><li>A=T (2 H bağ), G≡C (3 H bağ)</li><li>Antiparalel çift sarmal (Watson-Crick)</li></ul><h2>DNA Replikasyonu</h2><ul><li>Yarı-korunumlu: her yeni DNA'da 1 eski + 1 yeni zincir</li><li>Enzimler: helikaz, primaz, DNA polimeraz, ligaz</li></ul><h2>Transkripsiyon</h2><p>DNA → mRNA (çekirdekte)</p><ul><li>RNA polimeraz, promotör bölgesi</li><li>mRNA kodonu: 3 baz → 1 amino asit</li></ul><h2>Translasyon</h2><p>mRNA → Protein (ribozomda)</p><ul><li>tRNA antikodon ile eşleşir</li><li>Başlatma, uzama, sonlanma</li></ul>`,tar:'2024-09-07',ok:312},
  {id:405,dId:4,tip:'konu',bas:'Kalıtım ve Mendel Genetiği',ice:`<h2>Mendel Yasaları</h2><ul><li><b>Ayrılma yasası:</b> Aleller gametlerde birbirinden ayrılır</li><li><b>Bağımsız dağılım:</b> Farklı genlerin alelleri bağımsız dağılır</li></ul><h2>Terimler</h2><ul><li>Genotip: genetik yapı (AA, Aa, aa)</li><li>Fenotip: görünür özellik</li><li>Homozigot: AA veya aa</li><li>Heterozigot: Aa</li><li>Dominant: A (büyük harf)</li><li>Resesif: a (küçük harf)</li></ul><h2>Çaprazlama Oranları</h2><ul><li>Aa × Aa → 1AA:2Aa:1aa (genotip), 3:1 (fenotip)</li><li>Aa × aa → 1Aa:1aa (test çaprazlaması)</li></ul><h2>İnkomplet Dominantlık</h2><p>Heterozigot fenotip ara (kırmızı+beyaz=pembe)</p><h2>Eşbaskınlık</h2><p>Her iki alel de ifade edilir (AB kan grubu)</p>`,tar:'2024-09-09',ok:289},
  {id:406,dId:4,tip:'konu',bas:'Ekoloji',ice:`<h2>Ekolojik Organizasyon</h2><ul><li>Birey → Popülasyon → Topluluk → Ekosistem → Biyosfer</li></ul><h2>Besin Zincirleri ve Ağları</h2><ul><li>Üreticiler (ototrof) → Birincil tüketiciler → İkincil tüketiciler</li><li>Enerji her kademede %10 aktarılır</li><li>Biyokütle ve enerji piramitten yukarı azalır</li></ul><h2>Biyojeokimyasal Döngüler</h2><ul><li>Karbon döngüsü: fotosentez, solunum, fosil yakıt</li><li>Azot döngüsü: fikse, nitrifikasyon, denitrifikasyon</li><li>Su döngüsü: buharlaşma, yoğunlaşma, yağış</li></ul><h2>Popülasyon Ekolojisi</h2><ul><li>Lojistik büyüme: S-eğrisi, taşıma kapasitesi (K)</li><li>Üstel büyüme: J-eğrisi (kaynak sınırsızsa)</li></ul>`,tar:'2024-09-11',ok:198},
  {id:407,dId:4,tip:'soru',bas:'Biyoloji — Karma Sorular',ice:'soru',sorular:[
    {m:'Hangi organel enerji santralı olarak bilinir?',s:['Ribozom','Golgi','Mitokondri','Lizozom'],c:2},
    {m:'Fotosentezin ışık bağımsız reaksiyonu nerede gerçekleşir?',s:['Tilakoit','Stroma','Sitozol','Çekirdek'],c:1},
    {m:'DNA\'da adenin ile hangi baz eşleşir?',s:['Guanin','Sitozin','Timin','Urasil'],c:2},
    {m:'Glikoliz nerede gerçekleşir?',s:['Mitokondri','Kloroplast','Sitozol','Çekirdek'],c:2},
    {m:'Aa × Aa çaprazlamasında fenotip oranı?',s:['1:1','1:2:1','3:1','2:1'],c:2},
    {m:'Enerji piramitinde her kademede transfer oranı?',s:['%1','%10','%50','%90'],c:1}
  ],tar:'2024-09-13',ok:356},

  {id:501,dId:5,tip:'konu',bas:'Sözcük Türleri',ice:`<h2>İsim (Ad)</h2><ul><li>Özel: Ali, Ankara, Türkiye</li><li>Cins: insan, şehir, ülke</li><li>Soyut: sevgi, özgürlük / Somut: masa, su</li><li>Topluluk isimleri: ordu, sürü, demet</li></ul><h2>Sıfat</h2><ul><li>Niteleme: güzel, büyük</li><li>Belirtme: bu, o, hangi, kaç</li><li>Sıfat tamlaması: büyük ev</li></ul><h2>Fiil</h2><ul><li>İş: koşmak, yazmak</li><li>Durum: sevmek, bilmek</li><li>Oluş: büyümek, solmak</li><li>Yardımcı fiil: et-, ol-, yap-</li></ul><h2>Zamir, Zarf, Edat, Bağlaç, Ünlem</h2><ul><li>Zamir: ben, sen, o, kendi, kim</li><li>Zarf: hızlı, dün, çok, sessizce</li><li>Edat: için, ile, kadar, göre, rağmen</li><li>Bağlaç: ve, veya, ama, çünkü, ki</li><li>Ünlem: ah, of, ey, hey</li></ul>`,tar:'2024-09-02',ok:287},
  {id:502,dId:5,tip:'konu',bas:'Sözcükte Yapı ve Ekler',ice:`<h2>Kök ve Gövde</h2><ul><li>Kök: daha fazla bölünemeyen parça (ev, gel)</li><li>Gövde: kök + yapım eki (evci, gelişim)</li></ul><h2>Yapım Ekleri</h2><ul><li>İsimden isim: -cı/-ci, -lık/-lik, -sız/-siz, -lı/-li</li><li>İsimden fiil: -la/-le, -lan/-len, -laş/-leş</li><li>Fiilden isim: -me/-ma, -iş, -ek, -mek, -im</li><li>Fiilden fiil: -il, -in, -iş, -dir, -tir</li></ul><h2>Çekim Ekleri</h2><ul><li>İsim çekim ekleri: hal, iyelik, çoğul</li><li>Fiil çekim ekleri: zaman, kip, şahıs</li></ul><h2>Sözcük Türetme</h2><ul><li>Birleşik sözcük: anayol, gecekondu, ayakabı</li><li>Önek (yabancı): anti-, post-, ön-</li></ul>`,tar:'2024-09-04',ok:234},
  {id:503,dId:5,tip:'konu',bas:'Fiil Çekimleri ve Kipleri',ice:`<h2>Haber (Bildirme) Kipleri</h2><ul><li>Geniş zaman: -r/-ar/-er</li><li>Geçmiş zaman: -dı/-di</li><li>Öğrenilen geçmiş: -mış/-miş</li><li>Şimdiki zaman: -ıyor/-iyor</li><li>Gelecek zaman: -acak/-ecek</li></ul><h2>Dilek (Tasarlama) Kipleri</h2><ul><li>Şart: -sa/-se</li><li>İstek: -a/-e</li><li>Gereklilik: -malı/-meli</li><li>Emir: -sin/-sın (2. ve 3. kişi)</li></ul><h2>Birleşik Zaman</h2><ul><li>-yor + -dı → şimdiki geçmiş: yapıyordu</li><li>-mış + -tı → öğrenilen geçmişin hikayesi</li></ul>`,tar:'2024-09-06',ok:265},
  {id:504,dId:5,tip:'konu',bas:'Cümle Ögeleri ve Türleri',ice:`<h2>Cümle Ögeleri</h2><ul><li><b>Yüklem:</b> Cümlenin temel ögesi, en sonda</li><li><b>Özne:</b> Yüklemin bildirdiği işi yapan/olan</li><li><b>Belirtili nesne:</b> -i/-ı hali, yüklemi etkiler</li><li><b>Belirtisiz nesne:</b> Yalın halde, sıfır eki</li><li><b>Dolaylı tümleç:</b> -e/-a, -de/-da, -den/-dan</li><li><b>Zarf tümleci:</b> Yer, zaman, miktar, durum</li></ul><h2>Cümle Türleri</h2><ul><li>Fiil/isim cümlesi (yüklemine göre)</li><li>Basit/bileşik/sıralı/bağlı (yapısına göre)</li><li>Olumlu/olumsuz/soru (anlamına göre)</li></ul>`,tar:'2024-09-08',ok:312},
  {id:505,dId:5,tip:'konu',bas:'Edebi Sanatlar',ice:`<h2>Benzetme (Teşbih)</h2><p>Benzeyen + benzetilen + benzetme yönü + edat. "Aslan gibi güçlü adam"</p><h2>İstiare</h2><p>Eksik benzetme. "Akıncılar koştu" (at yerine asker)</p><ul><li>Açık istiare: sadece benzetilen</li><li>Kapalı istiare: sadece benzeyen</li></ul><h2>Mecaz-ı Mürsel (Düz Mecaz)</h2><p>Benzerlik dışı ilişki: "Beyaz saç" → yaşlı adam</p><h2>Kişileştirme (Teşhis) ve Konuşturma</h2><p>Cansız varlıklara insan özelliği verme.</p><h2>Tezat, Mübalağa, Tekrir</h2><ul><li>Tezat: zıt kavramlar "Gülerken ağladım"</li><li>Mübalağa: abartma "Dağ gibi yük"</li><li>Tekrir: vurgu için tekrar</li></ul><h2>İltifat, Tariz, Kinaye</h2><ul><li>Tariz: iğneleyici söz</li><li>Kinaye: hem gerçek hem mecaz anlam</li></ul>`,tar:'2024-09-14',ok:276},
  {id:506,dId:5,tip:'konu',bas:'Divan Edebiyatı',ice:`<h2>Genel Özellikleri</h2><ul><li>13-19. yüzyıllar, Arap-Fars etkisi</li><li>Aruz vezni, ağır ve süslü dil</li><li>Dini ve aşk temaları</li><li>Mazmunlar (kalıplaşmış imgeler)</li></ul><h2>Önemli Şairler</h2><ul><li><b>Fuzuli (16.yy):</b> Su kasidesi, Leyla ile Mecnun</li><li><b>Baki (16.yy):</b> Kanuni için mersiye, "Sultanü'ş-şuara"</li><li><b>Nedim (18.yy):</b> Lale devri, neşeli, mahallileşme</li><li><b>Şeyh Galip (18.yy):</b> Hüsn ü Aşk mesnevisi</li></ul><h2>Nazım Biçimleri</h2><ul><li>Gazel: 5-15 beyit, aa/ba/ca</li><li>Kaside: övgü, nesib+girizgah+medhiye</li><li>Mesnevi: uzun anlatı, aaббcc...</li><li>Rubai: 4 dize, 1. 2. 4. kafiyeli</li></ul>`,tar:'2024-09-16',ok:198},
  {id:507,dId:5,tip:'konu',bas:'Halk ve Tanzimat Edebiyatı',ice:`<h2>Halk Edebiyatı</h2><ul><li>Hece vezni (7'li, 8'li, 11'li)</li><li>Sade dil, somut imgeler</li><li>Yunus Emre: tasavvufi şiir</li><li>Karacaoğlan: aşk ve doğa</li><li>Köroğlu: kahramanlık</li></ul><h2>Tanzimat (1860-1896)</h2><ul><li>Batı etkisi başlar, "Şinasi" ile</li><li>Roman, tiyatro, gazete türleri</li><li>1. dönem: Sanat toplum içindir</li><li>2. dönem: Sanat sanat içindir</li><li>Namık Kemal: İntibah, Vatan Yahut Silistre</li><li>Recaizade: Araba Sevdası (ilk realist roman)</li></ul><h2>Servet-i Fünun (1896-1901)</h2><ul><li>Fransız etkisi, bireysel, karamsar</li><li>Halit Ziya: Aşk-ı Memnu, Mai ve Siyah</li><li>Tevfik Fikret: Sis, Rübab-ı Şikeste</li></ul>`,tar:'2024-09-20',ok:187},
  {id:508,dId:5,tip:'konu',bas:'Cumhuriyet Dönemi Edebiyatı',ice:`<h2>Milli Edebiyat (1911-1923)</h2><ul><li>Sade Türkçe, halka yönelik, Anadolu</li><li>Ömer Seyfettin: hikayecilik</li><li>Ziya Gökalp: Türkçülüğün Esasları</li></ul><h2>Cumhuriyet Sonrası</h2><ul><li>Beş Hececiler: Faruk Nafiz (Han Duvarları)</li><li>Garip (I. Yeni): Orhan Veli, Melih Cevdet, Oktay Rifat</li><li>II. Yeni: Kapalı anlam, Cemal Süreya, Edip Cansever</li></ul><h2>Önemli Romancılar</h2><ul><li>Halide Edib: Vurun Kahpeye, Ateşten Gömlek</li><li>Yakup Kadri: Yaban, Kiralık Konak, Ankara</li><li>Reşat Nuri: Çalıkuşu, Yaprak Dökümü</li><li>Kemal Tahir: Devlet Ana</li><li>Orhan Pamuk: Kar, İstanbul, Benim Adım Kırmızı</li></ul>`,tar:'2024-09-24',ok:198},
  {id:509,dId:5,tip:'soru',bas:'Türkçe/Edebiyat — Karma Sorular',ice:'soru',sorular:[
    {m:'"Asker gibi güçlü" edebi sanat?',s:['İstiare','Teşbih','Mübalağa','Tezat'],c:1},

    {m:'"Gözü açık gitmek" hangi sanat?',s:['Teşbih','Kinaye','İstiare','Mecaz'],c:1},
    {m:'Aşk-ı Memnu kimin eseri?',s:['Namık Kemal','Halit Ziya','Tevfik Fikret','Recaizade'],c:1}

  {id:601,dId:6,tip:'konu',bas:'Osmanlı Kuruluş ve Yükseliş Dönemi',ice:`<h2>Kuruluş (1299-1453)</h2><ul><li>Osman Gazi tarafından kuruldu (1299)</li><li>Orhan Gazi: ilk divan ve kadı atamaları</li><li>I. Murat: Rumeli'ye geçiş, yeniçeri teşkilatı</li><li>I. Bayezid: Niğbolu Zaferi (1396), Ankara Savaşı (1402)</li><li>Fetret Devri (1402-1413): Çelebi Mehmet yeniden birliği sağladı</li></ul><h2>Yükseliş (1453-1579)</h2><ul><li>II. Mehmet (Fatih): İstanbul'un fethi 1453</li><li>II. Bayezid: İspanya'dan sürgün Yahudileri kabul etti</li><li>Yavuz Sultan Selim: Mercidabık (1516), Ridaniye (1517), Halifelik</li><li>Kanuni Sultan Süleyman: Mohaç (1526), Viyana kuşatması (1529), Preveze (1538)</li></ul>`,tar:'2024-09-01',ok:234},
  {id:602,dId:6,tip:'konu',bas:'Osmanlı Duraklama ve Gerileme',ice:`<h2>Duraklama Dönemi (1579-1699)</h2><ul><li>II. Selim sonrası merkezi otorite zayıfladı</li><li>Celali İsyanları</li><li>Köprülüler dönemi (geçici toparlanma)</li><li>II. Viyana Kuşatması başarısızlığı (1683)</li><li>Karlofça Antlaşması (1699): ilk büyük toprak kaybı</li></ul><h2>Gerileme Dönemi (1699-1792)</h2><ul><li>Lale Devri (1718-1730): kültürel açılım</li><li>III. Selim: Nizam-ı Cedid reformları</li><li>Küçük Kaynarca (1774): Rusya'ya kapitülasyon</li></ul><h2>Dağılma Dönemi (1792-1922)</h2><ul><li>II. Mahmut: Yeniçeri ocağının kaldırılması (1826)</li><li>Tanzimat Fermanı (1839)</li><li>Islahat Fermanı (1856)</li><li>Meşrutiyetler: I (1876), II (1908)</li></ul>`,tar:'2024-09-03',ok:198},
  {id:603,dId:6,tip:'konu',bas:'Kurtuluş Savaşı ve Cumhuriyet',ice:`<h2>Mondros ve İşgaller (1918-1919)</h2><ul><li>Mondros Mütarekesi (30 Ekim 1918)</li><li>İzmir'in işgali (15 Mayıs 1919)</li><li>İstanbul'un işgali (16 Mart 1920)</li></ul><h2>Kurtuluş Savaşı</h2><ul><li>Mustafa Kemal Samsun'a çıkışı (19 Mayıs 1919)</li><li>Erzurum Kongresi (1919), Sivas Kongresi (1919)</li><li>TBMM'nin açılması (23 Nisan 1920)</li><li>Sakarya Meydan Muharebesi (Ağustos-Eylül 1921)</li><li>Büyük Taarruz ve Başkomutanlık Meydan Muharebesi (Ağustos 1922)</li><li>Mudanya Ateşkesi (Ekim 1922), Lozan (1923)</li></ul><h2>Cumhuriyet'in İlanı</h2><p>29 Ekim 1923 — Türkiye Cumhuriyeti ilan edildi.</p>`,tar:'2024-09-05',ok:312},
  {id:604,dId:6,tip:'konu',bas:'Atatürk İnkılapları',ice:`<h2>Siyasi İnkılaplar</h2><ul><li>Saltanatın kaldırılması (1 Kasım 1922)</li><li>Cumhuriyetin ilanı (29 Ekim 1923)</li><li>Halifeliğin kaldırılması (3 Mart 1924)</li><li>Çok partili hayat denemeleri</li></ul><h2>Eğitim ve Kültür</h2><ul><li>Öğretim birliği (3 Mart 1924)</li><li>Harf inkılabı (1 Kasım 1928)</li><li>Türk Tarih Kurumu (1931), TDK (1932)</li><li>Üniversite reformu (1933)</li></ul><h2>Hukuk ve Toplum</h2><ul><li>Türk Medeni Kanunu (1926)</li><li>Kadınlara seçme hakkı (1934)</li><li>Soyadı Kanunu (1934)</li></ul><h2>Ekonomi</h2><ul><li>Devletçilik ilkesi</li><li>İzmir İktisat Kongresi (1923)</li></ul>`,tar:'2024-09-07',ok:267},

  {id:701,dId:7,tip:'konu',bas:'Türkiye\'nin Coğrafi Özellikleri',ice:`<h2>Konum</h2><ul><li>36°-42° kuzey enlemi, 26°-45° doğu boylamı</li><li>Anadolu + Trakya</li><li>Kıtasal konumu: Asya-Avrupa köprüsü</li></ul><h2>Yüzey Şekilleri</h2><ul><li>Ova: Konya, Çukurova, Gediz, Büyük Menderes</li><li>Plato: Cihanbeyli, Haymana, Taşeli</li><li>Dağlar: Toroslar, Kaçkar, Uludağ, Erciyes</li></ul><h2>İklim Çeşitliliği</h2><ul><li>Karadeniz: bol yağış, her mevsim yağışlı</li><li>Akdeniz: yaz kuru ve sıcak, kış ılık ve yağışlı</li><li>İç Anadolu: karasal, sıcaklık farkı büyük</li><li>Doğu Anadolu: sert karasal</li></ul><h2>Nüfus ve Yerleşme</h2><ul><li>Nüfus yoğunluğu: kıyılar > iç bölgeler</li><li>Göç: kırdan kente, batıya</li></ul>`,tar:'2024-09-01',ok:213},
  {id:702,dId:7,tip:'konu',bas:'İklim ve Bitki Örtüsü',ice:`<h2>İklimi Belirleyen Faktörler</h2><ul><li>Enlem, yükselti, kara-deniz etkisi, dağların uzanışı</li></ul><h2>Türkiye İklim Bölgeleri</h2><table><tr><th>Bölge</th><th>İklim</th><th>Bitki</th></tr><tr><td>Karadeniz</td><td>Nemli-ılıman</td><td>Orman, çay, fındık</td></tr><tr><td>Akdeniz</td><td>Akdeniz</td><td>Maki, zeytinlik</td></tr><tr><td>İç Anadolu</td><td>Karasal</td><td>Step (bozkır)</td></tr><tr><td>Doğu Anadolu</td><td>Sert karasal</td><td>Çayır, dağ bozkırı</td></tr><tr><td>Ege</td><td>Akdeniz+geçiş</td><td>Maki, zeytin, bağ</td></tr></table><h2>Ekolojik Bölgeler</h2><ul><li>Orman kuşağı: Karadeniz, güney yamaçlar</li><li>Step: İç Anadolu platolar</li><li>Tundra benzeri: yüksek dağ zirvelerinde</li></ul>`,tar:'2024-09-03',ok:178},
  {id:703,dId:7,tip:'konu',bas:'Dünya Coğrafyası',ice:`<h2>Kıtalar</h2><ul><li>7 kıta: Asya (en büyük), Afrika, K.Amerika, G.Amerika, Antarktika, Avrupa, Avustralya</li></ul><h2>Okyanuslar</h2><ul><li>Pasifik (en büyük), Atlantik, Hint, Arktik, Güney</li></ul><h2>Önemli Coğrafi Kavramlar</h2><ul><li>Ekvator: 0° enlem, en fazla güneş enerjisi</li><li>Dönenceler: ±23.5°, tropik iklim</li><li>Kutup çevreleri: ±66.5°</li><li>Başlangıç meridyeni: Greenwich (0° boylam)</li></ul><h2>Levha Tektoniği</h2><ul><li>Birbirinden uzaklaşan: okyanus ortası sırtlar</li><li>Çarpışan: dağ oluşumu (Himalayalar)</li><li>Yanal kayan: Kuzey Anadolu Fay Hattı</li></ul>`,tar:'2024-09-05',ok:156},
  {id:704,dId:7,tip:'soru',bas:'Coğrafya — Karma Sorular',ice:'soru',sorular:[

  {id:801,dId:8,tip:'konu',bas:'Felsefenin Temel Kavramları',ice:`<h2>Felsefe Nedir?</h2><p>Yunanca "philo" (sevgi) + "sophia" (bilgelik). Varlık, bilgi, değer sorularını akıl yoluyla araştırır.</p><h2>Temel Felsefe Dalları</h2><ul><li><b>Ontoloji:</b> Varlığın ne olduğu</li><li><b>Epistemoloji:</b> Bilginin kaynağı ve sınırları</li><li><b>Etik:</b> Ahlak ve değer</li><li><b>Estetik:</b> Güzellik ve sanat</li><li><b>Mantık:</b> Doğru düşünme kuralları</li></ul><h2>Temel Sorular</h2><ul><li>Varlık nedir? Bilinebilir mi?</li><li>Bilginin kaynağı nedir? Kesin bilgi var mı?</li><li>İyi nedir? Ahlaki eylem nasıl olmalı?</li></ul>`,tar:'2024-09-01',ok:167},
  {id:802,dId:8,tip:'konu',bas:'Antik Yunan Filozofları',ice:`<h2>Sokrates Öncesi (Doğa Filozofları)</h2><ul><li>Thales: Su arkhedir (ilk neden)</li><li>Herakleitos: Her şey değişir, "aynı nehre girilmez"</li><li>Parmenides: Değişim yanılsamadır, tek gerçek Bir</li><li>Demokritos: Atom teorisi</li></ul><h2>Sokrates</h2><ul><li>Diyalog yöntemi, ironi, mayötik (doğurma)</li><li>"Kendini bil" — ahlak üzerine sorular</li></ul><h2>Platon</h2><ul><li>İdealar teorisi: gerçek dünya idealar dünyası</li><li>Mağara alegorisi</li><li>Devlet (Politeia): ideal devlet</li></ul><h2>Aristoteles</h2><ul><li>Platon'u reddeder: formlar maddeyle birlikte</li><li>Mantık (syllogism), Kategoriler</li><li>Etika: mutluluk (eudaimonia), erdem</li></ul>`,tar:'2024-09-03',ok:145},
  {id:803,dId:8,tip:'soru',bas:'Felsefe — Karma Sorular',ice:'soru',sorular:[
    {m:'"Kendini bil" sözü kime aittir?',s:['Platon','Aristoteles','Sokrates','Descartes'],c:2},

    {m:'Mantık ilkeleriyle ünlü Antik Yunan filozofu?',s:['Sokrates','Herakleitos','Aristoteles','Parmenides'],c:2},
    {m:'Epistemoloji neyi inceler?',s:['Varlığı','Güzelliği','Bilgiyi','Ahlakı'],c:2}
  ],tar:'2024-09-05',ok:198},

  {id:901,dId:9,tip:'not',bas:'Tıp 1. Yıl — Anatomi Temelleri',ice:`<h2>Temel Yönler</h2><ul><li>Superior/İnferior: Üst/Alt</li><li>Anterior/Posterior: Ön/Arka</li><li>Medial/Lateral: İç/Dış</li><li>Proksimal/Distal: Yakın/Uzak (ekstremitede)</li></ul><h2>Vücut Düzlemleri</h2><ul><li>Sagittal: sağ-sol ayırır</li><li>Koronal (frontal): ön-arka ayırır</li><li>Transversal: üst-alt ayırır</li></ul><h2>Kas Tipleri</h2><ul><li>İskelet kası: isteğe bağlı, çizgili</li><li>Kalp kası: istemsiz, çizgili</li><li>Düz kas: istemsiz, çizgisiz</li></ul>`,tar:'2024-09-25',ok:203},
  {id:902,dId:9,tip:'not',bas:'Fizyoloji — Sinir Sistemi',ice:`<h2>Nöron Yapısı</h2><ul><li>Soma, dendritler, akson, miyelin kılıf</li><li>Aksiyon potansiyeli: depolarizasyon → repolarizasyon</li><li>Sinaptik iletim: nörotransmiterler</li></ul><h2>MSS ve PSS</h2><ul><li>Merkezi: beyin + omurilik</li><li>Periferik: kranial sinirler (12 çift) + spinal sinirler (31 çift)</li></ul><h2>Otonom Sinir Sistemi</h2><ul><li>Sempatik: savaş-kaç, norepinefrin</li><li>Parasempatik: dinlen-sindirimi, asetilkolin</li></ul>`,tar:'2024-10-01',ok:178},
  {id:903,dId:10,tip:'not',bas:'Mühendislik — Diferansiyel Denklemler',ice:`<h2>Nedir?</h2><p>Fonksiyon ve türevlerini içeren denklemlerdir. dy/dx = f(x,y)</p><h2>1. Dereceden ODE</h2><ul><li>Değişkenler ayrılabilir: ∫g(y)dy = ∫f(x)dx</li><li>Lineer: dy/dx + P(x)y = Q(x)</li><li>İntegral faktörü: μ = e^(∫P dx)</li></ul><h2>2. Dereceden ODE</h2><ul><li>Sabit katsayılı: ay''+by'+cy=0</li><li>Karakteristik denklem: ar²+br+c=0</li></ul><h2>Laplace Dönüşümü</h2><p>L{f(t)} = ∫₀^∞ e^(-st)f(t)dt</p><ul><li>Karmaşık diferansiyel denklemleri cebirsel probleme dönüştürür</li></ul>`,tar:'2024-09-28',ok:156},
];

// Kullanıcı eklediği içeriklerle birleştir
function TumIcerik(){
  const kayitli = R('icerik')
  // Sadece kullanıcı tarafından eklenenleri al (id > 1000 ve DATA'da olmayanlar)
  const dataIds = new Set(ICERIK_DATA.map(i=>i.id))

}

// ═══ AUTH ════════════════════════════════════════════════════════
let AK=null, MB=null
const DL={}, KL={}
const RL=ip=>{const n=Date.now();if(!DL[ip])DL[ip]=[];DL[ip]=DL[ip].filter(t=>n-t<60000);if(DL[ip].length>=10)return false;DL[ip].push(n);return true}
const KLM=u=>{if(!KL[u])return false;if(Date.now()>KL[u]){delete KL[u];return false}return true}

function aSekme(s){
  ['giris','mfa','kayit'].forEach(x=>document.getElementById('a-'+x).style.display=x===s?'block':'none')
  document.querySelectorAll('.atab').forEach((t,i)=>t.classList.toggle('active',(i===0&&s==='giris')||(i===1&&s==='kayit')))
  aHide()
}
function giris(){
  const u=document.getElementById('g-u').value.trim(),p=document.getElementById('g-p').value
  aHide()
  if(!u||!p){aShow('Tüm alanları doldur.','error');return}
  if(!RL('x')){aShow('Çok fazla deneme.','error');return}
  if(KLM(u)){aShow('Hesap kilitli.','error');return}
  const k=R('kul').find(k=>k.u===u&&k.p===p)
  if(!k){if(!DL[u])DL[u]=0;DL[u]++;if(DL[u]>=5){KL[u]=Date.now()+300000;DL[u]=0}aShow('Hatalı giriş.','error');return}
  MB=k
  document.getElementById('mfa-hint').textContent='Demo kodu: '+k.mfa
  aSekme('mfa');setTimeout(()=>document.getElementById('mfa-c').focus(),100)
}
function mfaTam(){
  const kod=document.getElementById('mfa-c').value.trim()
  if(!MB){aSekme('giris');return}
  if(kod!==MB.mfa){aShow('Kod yanlış.','error');return}
  AK=MB;MB=null
  document.getElementById('s-av').textContent=AK.u[0].toUpperCase()
  document.getElementById('s-un').textContent=AK.u
  document.getElementById('s-rol').textContent=AK.rol==='admin'?'👑 Admin':'🎓 Öğrenci'
  document.getElementById('tb-user').textContent=AK.u
  if(AK.rol==='admin'){document.getElementById('adm-sec').style.display='block';document.getElementById('adm-btn').style.display='flex'}
  document.getElementById('pg-auth').classList.remove('active')
  document.getElementById('pg-app').classList.add('active')
  git('ana')
}
function kayit(){
  const u=document.getElementById('k-u').value.trim(),p=document.getElementById('k-p').value,p2=document.getElementById('k-p2').value
  if(!u||!p){aShow('Tüm alanları doldur.','error');return}
  if(p.length<4){aShow('Şifre en az 4 karakter.','error');return}
  if(p!==p2){aShow('Şifreler eşleşmiyor.','error');return}
  const kul=R('kul')
  if(kul.find(k=>k.u===u)){aShow('Bu kullanıcı adı alınmış.','error');return}
  kul.push({id:Date.now(),u,p,rol:'ogrenci',mfa:'123456'});W('kul',kul)
  aShow('Kayıt başarılı! (2FA: 123456)','success')
  setTimeout(()=>aSekme('giris'),2000)
}
function cikis(){
  AK=null
  document.getElementById('pg-app').classList.remove('active')
  document.getElementById('pg-auth').classList.add('active')
  document.getElementById('adm-sec').style.display='none'
  document.getElementById('adm-btn').style.display='none'
  aSekme('giris')
  ;['g-u','g-p','mfa-c'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''})
}
function aShow(m,t){const e=document.getElementById('a-alert');e.className='alert '+t;e.textContent=m;e.style.display='block'}
function aHide(){document.getElementById('a-alert').style.display='none'}

const TITLES={ana:'Anasayfa',dersler:'YKS Dersleri',sorular:'Soru Bankası',formuller:'Formül Kütüphanesi',puan:'Puan Hesapla',bolumler:'Bölüm Tanıtımları',notlar:'Ders Notları',siralama:'Sıralama Rehberi',takvim:'Çalışma Takvimi',bot:'YKS Soru Botu',admin:'Yönetim Paneli'}
function git(s,p=null){
  document.querySelectorAll('.nitem').forEach(e=>e.classList.remove('active'))
  const aktif = document.querySelector(`.nitem[data-sayfa="${s}"]`)
  if(aktif) aktif.classList.add('active')
  document.getElementById('tb-title').textContent=TITLES[s]||s
  const fns={ana:rAna,dersler:rDersler,sorular:rSorular,formuller:rFormulller,puan:rPuan,bolumler:rBolumler,notlar:rNotlar,siralama:rSiralama,takvim:rTakvim,bot:rBot,admin:rAdmin}
  const fn = fns[s]||rAna;
  const result = fn(p);
  // rBot kendi innerHTML'ini set eder, boş string döner
  if(result !== '') document.getElementById('mc').innerHTML = result||'';
}

// ═══ DERSLER ═════════════════════════════════════════════════════
function rDersler(filtre=null){
  const dr=R('dersler'),ic=TumIcerik()
  if(filtre){
    const d=dr.find(x=>x.id===filtre);if(!d)return''
    const list=ic.filter(i=>i.dId===filtre)
    const konular=list.filter(i=>i.tip==='konu')
    const sorular=list.filter(i=>i.tip==='soru')
    const notlar=list.filter(i=>i.tip==='not')
    return`<div class="bc"><span onclick="git('dersler')">📖 Dersler</span><span class="bcsep">›</span><span>${d.ikon} ${d.ad}</span></div>
    <div class="konu-filtre"><button class="kfiltre-btn active" onclick="filtreDers(this,'hepsi')">Tümü (${list.length})</button><button class="kfiltre-btn" onclick="filtreDers(this,'konu')">📖 Konular (${konular.length})</button><button class="kfiltre-btn" onclick="filtreDers(this,'soru')">✏️ Sorular (${sorular.length})</button>${notlar.length?`<button class="kfiltre-btn" onclick="filtreDers(this,'not')">📝 Notlar (${notlar.length})</button>`:''}</div>
    <div class="card" id="ders-liste"><div class="card-header"><div class="card-title">${d.ikon} ${d.ad}</div>${AK?.rol==='admin'?`<button class="btn btn-primary btn-sm" onclick="iEkleModal(${d.id})">+ Ekle</button>`:''}</div>
    ${!list.length?`<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Henüz içerik yok</div></div>`:`<ul class="ilist" id="ders-ilist">${list.map(i=>`<li class="iitem" data-tip="${i.tip}" onclick="iGoster(${i.id})"><span class="ibadge ${i.tip==='konu'?'bk':i.tip==='soru'?'bs':'bn'}">${i.tip}</span><span class="ititle">${i.bas}</span><span class="imeta">👁 ${i.ok||0}</span></li>`).join('')}</ul>`}</div>`
  }
  const kart=d=>{const c=ic.filter(i=>i.dId===d.id).length;return`<div class="${d.renk}" onclick="git('dersler',${d.id})"><div class="dcard"><div class="dicon">${d.ikon}</div><div class="dname">${d.ad}</div><div class="dcount">${c} içerik</div></div></div>`}
  return`<h2 style="font-family:'DM Serif Display',serif;font-size:1.4rem;font-weight:400;margin-bottom:1rem">YKS Dersleri</h2><div class="dgrid">${dr.filter(d=>d.kat==='yks').map(kart).join('')}</div>
  <h2 style="font-family:'DM Serif Display',serif;font-size:1.4rem;font-weight:400;margin-bottom:1rem">Üniversite Dersleri</h2><div class="dgrid">${dr.filter(d=>d.kat==='uni').map(kart).join('')}</div>`
}

function filtreDers(btn,tip){
  document.querySelectorAll('.kfiltre-btn').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
  const items=document.querySelectorAll('#ders-ilist .iitem')
  items.forEach(item=>{item.style.display=(tip==='hepsi'||item.dataset.tip===tip)?'flex':'none'})
}

// ═══ İÇERİK GÖRÜNTÜLE ═══════════════════════════════════════════
function iGoster(id){
  const ic=TumIcerik(),dr=R('dersler'),i=ic.find(x=>x.id===id);if(!i)return
  const d=dr.find(x=>x.id===i.dId)
  // Okunma sayısını güncelle (sadece kullanıcı eklenenler için localStorage'da)
  let body=i.tip==='soru'&&i.sorular
    ?i.sorular.map((s,si)=>`<div class="skutu"><div class="sno">Soru ${si+1}</div><div class="smetin">${s.m}</div><ul class="ssec-list">${s.s.map((se,xi)=>`<li class="ssec" onclick="sCevap(this,${xi},${s.c})">${String.fromCharCode(65+xi)}) ${se}</li>`).join('')}</ul></div>`).join('')
    :`<div class="idetay-body">${i.ice}</div>`
  document.getElementById('mc').innerHTML=`<div class="bc"><span onclick="git('dersler')">📖 Dersler</span><span class="bcsep">›</span><span onclick="git('dersler',${i.dId})">${d?.ikon} ${d?.ad}</span><span class="bcsep">›</span><span>${i.bas}</span></div>
  <div class="card"><div class="card-body"><div class="idetay">
    <div style="display:flex;gap:.6rem;margin-bottom:.8rem"><span class="ibadge ${i.tip==='konu'?'bk':i.tip==='soru'?'bs':'bn'}">${i.tip}</span><span style="font-size:.82rem;color:var(--muted)">${d?.ikon} ${d?.ad}</span></div>
    <h1>${i.bas}</h1><div class="idetay-meta"><span>📅 ${i.tar||''}</span><span>👁 ${i.ok||0} okunma</span></div>${body}
  </div></div></div>`
}
function sCevap(el,s,d){const es=el.closest('.ssec-list').querySelectorAll('.ssec');es.forEach(x=>x.style.pointerEvents='none');el.classList.add(s===d?'dogru':'yanlis');if(s!==d)es[d].classList.add('dogru')}

function formAra(){

      <div class="pig"><label>Sosyal (20)</label><input type="number" id="ts" min="0" max="20" placeholder="0" oninput="pH()"></div>
      <div class="pig"><label>Matematik (40)</label><input type="number" id="tm" min="0" max="40" placeholder="0" oninput="pH()"></div>
      <div class="pig"><label>Fen (20)</label><input type="number" id="tf" min="0" max="20" placeholder="0" oninput="pH()"></div>

      <div class="pig"><label>Fizik (14)</label><input type="number" id="af" min="0" max="14" placeholder="0" oninput="pH()"></div>

      <div class="pig"><label>Biyoloji (13)</label><input type="number" id="ab" min="0" max="13" placeholder="0" oninput="pH()"></div>
    </div></div></div>
  </div><div style="margin-top:1.5rem" id="ps"></div>`

function pH(){
  const al=id=>parseFloat(document.getElementById(id)?.value||0)
  const tH=al('tt')*1.4+al('ts')*1.2+al('tm')*1.4+al('tf')*1.2
  const tyt=Math.min(500,100+tH*2.5)
  const mf3=Math.min(550,100+(tH*.4+(al('am')*3.5+al('af')*3+al('ak')*3+al('ab')*3))*1.5)
  const mf4=Math.min(550,100+(tH*.4+(al('am')*4+al('af')*3.5+al('ak')*2.5+al('ab')*2.5))*1.5)
  const tm1=Math.min(550,100+(tH*.5+al('am')*4)*1.8)
  const el=document.getElementById('ps');if(!el)return
  el.innerHTML=`<div class="g4">${[['TYT',tyt,'var(--accent)'],['MF-3',mf3,'var(--green)'],['MF-4',mf4,'var(--orange)'],['TM-1',tm1,'var(--purple)']].map(([t,p,r])=>`<div class="stat" style="text-align:center"><div class="stat-label">${t}</div><div class="stat-value" style="color:${r}">${p.toFixed(1)}</div><div class="stat-sub">Yaklaşık</div></div>`).join('')}</div>
  <div style="margin-top:1rem;padding:1rem;background:var(--yl);border:1px solid #fde68a;border-radius:var(--r);font-size:.82rem;color:var(--yellow)">⚠️ Yaklaşık değerlerdir. Gerçek puan ÖSYM formülüne göre değişir.</div>`
}

  return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
    <div><h2 style="font-family:'DM Serif Display',serif;font-size:1.4rem;font-weight:400;margin-bottom:.2rem">Çalışma Takvimi</h2>

      <div style="font-size:.85rem;font-weight:700;margin-bottom:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">📅 Bugünün Planları</div>

      ${!gelecek.length?`<div class="card"><div class="card-body" style="text-align:center;color:var(--muted);padding:2rem">Gelecek plan yok.</div></div>`:

function takKart(p){
  const d=DERSLER_LIST.find(x=>x.id===p.dersId)||{ikon:'📖',ad:'?'};
  return`<div class="card" style="padding:0">
    <div style="padding:.9rem 1rem;display:flex;align-items:center;gap:.8rem">
      <div style="width:38px;height:38px;background:var(${p.tamamlandi?'--gl':'--al'});border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0">${d.ikon}</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:.9rem">${p.konu}</div>
        <div style="font-size:.78rem;color:var(--muted)">${d.ad} · ${p.sure} dk</div>
      </div>
      ${p.tamamlandi
        ?`<span style="background:var(--gl);color:var(--green);padding:.2rem .6rem;border-radius:5px;font-size:.72rem;font-weight:700">✓ Tamamlandı</span>`
        :`<button class="btn btn-success btn-sm" onclick="takTamamla(${p.id})">✓ Tamam</button>`}
    </div>
    ${p.not?`<div style="padding:.5rem 1rem;background:var(--bg);border-top:1px solid var(--border);font-size:.78rem;color:var(--muted);border-radius:0 0 var(--r) var(--r)">📝 ${p.not}</div>`:''}
  </div>`
}

function takPlanEkle(){
  const bugun = new Date().toISOString().slice(0,10);
  mAc('Yeni Çalışma Planı Ekle', `
    <div class="frow">
      <div class="fg"><label>Tarih</label><input type="date" id="tak-tarih" value="${bugun}"></div>
      <div class="fg"><label>Süre (dakika)</label><input type="number" id="tak-sure" value="45" min="5" max="300"></div>
    </div>
    <div class="fg ff" style="margin-bottom:1rem">
      <label>Ders</label>
      <select id="tak-ders" onchange="takKonuGuncelle()">
        ${DERSLER_LIST.map(d=>`<option value="${d.id}">${d.ikon} ${d.ad}</option>`).join('')}
      </select>
    </div>
    <div class="fg ff" style="margin-bottom:1rem">
      <label>Konu</label>
      <select id="tak-konu">
        ${(KONU_LIST[1]||[]).map(k=>`<option>${k}</option>`).join('')}
      </select>
    </div>
    <div class="fg ff"><label>Not (isteğe bağlı)</label><input type="text" id="tak-not" placeholder="Ek açıklama..."></div>
  `, [{m:'İptal',o:'mKapat()',c:'btn-outline'},{m:'Kaydet',o:'takKaydet()',c:'btn-primary'}])
}
function takKonuGuncelle(){
  const dId = parseInt(document.getElementById('tak-ders')?.value||1);
  const sel = document.getElementById('tak-konu');
  if(!sel) return;
  sel.innerHTML = (KONU_LIST[dId]||['Genel Çalışma']).map(k=>`<option>${k}</option>`).join('');
}
function takKaydet(){
  const tarih = document.getElementById('tak-tarih')?.value;
  const sure = parseInt(document.getElementById('tak-sure')?.value||45);
  const dersId = parseInt(document.getElementById('tak-ders')?.value||1);
  const konu = document.getElementById('tak-konu')?.value||'';
  const not = document.getElementById('tak-not')?.value?.trim()||'';
  if(!tarih||!konu){alert('Tarih ve konu zorunlu!');return}
  const data = TAK_GET();
  data.plans.push({id:Date.now(),tarih,sure,dersId,konu,not,tamamlandi:false});
  TAK_SET(data); mKapat(); git('takvim');
}
function takTamamla(id){
  const data = TAK_GET();
  const p = data.plans.find(x=>x.id===id);
  if(p) p.tamamlandi = true;
  TAK_SET(data); git('takvim');
}
function takSil(id){
  if(!confirm('Bu plan silinsin mi?'))return;
  const data = TAK_GET();
  data.plans = data.plans.filter(x=>x.id!==id);
  TAK_SET(data); git('takvim');
}

// ── Markdown benzeri formatla ──────────────────────────────
function botFormat(text){
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/「(.*?)」/g, '<code style="background:#dbeafe;padding:.1rem .35rem;border-radius:4px;font-size:.9em;color:#1e40af;font-family:monospace">$1</code>')
    .replace(/`(.*?)`/g, '<code style="background:#f1f5f9;padding:.1rem .3rem;border-radius:3px;font-size:.88em;font-family:monospace">$1</code>')
    .replace(/^\d+\.\s(.+)$/gm, '<div style="display:flex;gap:.5rem;margin:.25rem 0"><span style="background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0;margin-top:.15rem">$&</span></div>')
    // Numbered steps better
    .replace(/^(\d+)\.\s(.+)$/gm, (_, n, content) =>
      `<div style="display:flex;gap:.6rem;margin:.3rem 0;align-items:flex-start"><span style="background:var(--accent);color:#fff;border-radius:50%;min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;margin-top:.15rem">${n}</span><span>${content}</span></div>`)
    // Emoji headers
    .replace(/^(📖|🔢|🪜|✅|💡|🔗|📌|⚠️|🧠|🎯)\s(.+)$/gm,
      '<div style="font-weight:700;color:var(--text);margin:.7rem 0 .2rem;font-size:.9rem">$1 $2</div>')
    // Tables
    .replace(/\|(.+)\|/g, (match) => {
      if(match.includes('---')) return '';
      const cells = match.split('|').filter(c=>c.trim());
      const isHeader = false;
      return '<tr>' + cells.map(c=>`<td style="padding:.35rem .7rem;border:1px solid var(--border);font-size:.82rem">${c.trim()}</td>`).join('') + '</tr>';
    })
    .replace(/(<tr>.*<\/tr>\n?)+/gs, m =>
      `<div style="overflow-x:auto;margin:.5rem 0"><table style="border-collapse:collapse;width:100%">${m}</table></div>`)
    .replace(/\n/g, '<br>');
}

function botTTSToggle(){

function botTTS(btn, text){
  if(!window.speechSynthesis){ alert('Tarayıcı TTS desteklemiyor.'); return; }
  window.speechSynthesis.cancel();
  const temiz = text.replace(/[「」*#]/g,'').replace(/<[^>]+>/g,'');
  const utter = new SpeechSynthesisUtterance(temiz);
  utter.lang = 'tr-TR'; utter.rate = 0.9;
  const voices = speechSynthesis.getVoices().filter(v=>v.lang.startsWith('tr'));
  if(voices.length) utter.voice = voices[0];
  btn.textContent = '⏹️';
  utter.onend = ()=>{ btn.textContent = '🔊'; };
  speechSynthesis.speak(utter);
}

// ── Gönder / API ─────────────────────────────────────────
async function botGonder(){
  const inp = document.getElementById('bot-input');
  const mesaj = inp?.value?.trim();
  if(!mesaj) return;
  inp.value = '';
  document.getElementById('bot-charcount').textContent = '';

  const zaman = new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  botMesajlar.push({rol:'user', content:mesaj, zaman});
  botRender();
  botKaydır();

  const sendBtn = document.getElementById('bot-send-btn');
  if(sendBtn){sendBtn.disabled=true; sendBtn.innerHTML='<span style="animation:blink 1s infinite">⏳</span>';}

  const loadId = Date.now();
  botMesajlar.push({rol:'assistant', content:'', loading:true, id:loadId});
  botRender();
  botKaydır();

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: BOT_SYS(botZorluk, botDers),
        messages: botMesajlar.filter(m=>!m.id&&!m.loading).map(m=>({role:m.rol, content:m.content}))
      })
    });
    const data = await res.json();
    const cevap = data.content?.map(c=>c.text||'').join('') || 'Bir hata oluştu.';
    botMesajlar = botMesajlar.filter(m=>m.id!==loadId);
    const cevapZaman = new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
    botMesajlar.push({rol:'assistant', content:cevap, zaman:cevapZaman});
    if(botTTSAktif) botTTS({textContent:'🔊'}, cevap);
  } catch(err){
    botMesajlar = botMesajlar.filter(m=>m.id!==loadId);
    botMesajlar.push({rol:'assistant', content:'❌ Bağlantı hatası. Tekrar dene.', zaman:''});
  }

  botRender();
  botKaydır();
  if(sendBtn){sendBtn.disabled=false; sendBtn.textContent='Gönder ↑';}
}

    document.getElementById('ornek-'+i)?.addEventListener('click',()=>botHizliSor(s));
  });
}

  if(!botMesajlar.length||confirm('Sohbet geçmişine kaydedilsin mi?')){

}

function rAdmin(){
  if(AK?.rol!=='admin')return`<div class="empty"><div class="empty-icon">🚫</div><div class="empty-title">Yetkisiz Erişim</div></div>`
  const ic=TumIcerik(),dr=R('dersler'),bl=R('bolumler'),kul=R('kul')
  return`
  <div style="margin-bottom:2rem"><div style="font-size:.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1rem">📊 Genel Bakış</div>
  <div class="g4"><div class="stat"><div class="stat-label">İçerik</div><div class="stat-value">${ic.length}</div></div><div class="stat"><div class="stat-label">Ders</div><div class="stat-value">${dr.length}</div></div><div class="stat"><div class="stat-label">Bölüm</div><div class="stat-value">${bl.length}</div></div><div class="stat"><div class="stat-label">Kullanıcı</div><div class="stat-value">${kul.length}</div></div></div></div>
  <div style="margin-bottom:2rem"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem"><div style="font-size:.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">📖 Kullanıcı Tarafından Eklenen İçerikler</div><button class="btn btn-primary btn-sm" onclick="iEkleModal()">+ Yeni İçerik</button></div>
  <div class="card"><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Başlık</th><th>Tür</th><th>Ders</th><th>İşlem</th></tr></thead>
  <tbody>${R('icerik').map(i=>{const d=dr.find(x=>x.id===i.dId);return`<tr><td><b>${i.bas}</b></td><td><span class="ibadge ${i.tip==='konu'?'bk':i.tip==='soru'?'bs':'bn'}">${i.tip}</span></td><td>${d?.ikon||''} ${d?.ad||'?'}</td><td><button class="btn btn-danger btn-sm" onclick="iSil(${i.id})">Sil</button></td></tr>`}).join('')||`<tr><td colspan="4" style="text-align:center;color:var(--muted)">Henüz kullanıcı içeriği yok</td></tr>`}</tbody></table></div></div></div>`
}

function iEkleModal(dId=null){
  const dr=R('dersler')
  mAc('Yeni İçerik Ekle',`<div class="frow"><div class="fg"><label>Başlık</label><input type="text" id="f-b" placeholder="İçerik başlığı"></div><div class="fg"><label>Tür</label><select id="f-t"><option value="konu">Konu Anlatımı</option><option value="soru">Soru/Alıştırma</option><option value="not">Ders Notu</option></select></div></div>
  <div class="fg ff" style="margin-bottom:1rem"><label>Ders</label><select id="f-d">${dr.map(d=>`<option value="${d.id}"${d.id===dId?' selected':''}>${d.ikon} ${d.ad}</option>`).join('')}</select></div>
  <div class="fg ff"><label>İçerik (HTML destekli)</label><textarea id="f-i" placeholder="İçerik buraya..."></textarea></div>`,
  [{m:'İptal',o:'mKapat()',c:'btn-outline'},{m:'Kaydet',o:'iKaydet()',c:'btn-primary'}])
}
function iKaydet(){
  const b=document.getElementById('f-b')?.value?.trim(),ice=document.getElementById('f-i')?.value?.trim(),tip=document.getElementById('f-t')?.value,dId=parseInt(document.getElementById('f-d')?.value)
  if(!b||!ice){alert('Başlık ve içerik zorunlu!');return}
  const ic=R('icerik')
  ic.push({id:Date.now(),dId,tip,bas:b,ice,tar:new Date().toISOString().slice(0,10),ok:0})
  W('icerik',ic);mKapat();git('admin')
}
function iSil(id){
  if(!confirm('Silmek istediğine emin misin?'))return
  W('icerik',R('icerik').filter(i=>i.id!==id))
  git('admin')
}

// ═══ MODAL ═══════════════════════════════════════════════════════
function mAc(baslik,icerik,butonlar=[]){
  document.getElementById('mt').textContent=baslik
  document.getElementById('mb').innerHTML=icerik
  const f=document.getElementById('mf')
  f.innerHTML=butonlar.map(b=>`<button class="btn ${b.c}" onclick="${b.o}">${b.m}</button>`).join('')
  f.style.display=butonlar.length?'flex':'none'
  document.getElementById('mov').classList.add('open')
}
function mKapat(e){if(e&&e.target!==document.getElementById('mov'))return;document.getElementById('mov').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')mKapat()})
</script>
</body>
</html>
